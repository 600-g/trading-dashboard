<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>두근 트레이딩</title>
<link rel="preconnect" href="https://firestore.googleapis.com">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  :root {
    --bg: #F2F4F6;
    --surface: #FFFFFF;
    --line: #E5E8EB;
    --text-1: #191F28;
    --text-2: #4E5968;
    --text-3: #8B95A1;
    --text-4: #B0B8C1;
    --blue: #3182F6;
    --blue-bg: #E8F3FF;
    --red: #F04452;
    --red-bg: #FFE9EA;
    --green: #1B9856;
    --green-bg: #E5F5EC;
    --yellow: #F8AE3C;
    --yellow-bg: #FFF4D6;
    --purple: #8B5CF6;
    --purple-bg: #F0EBFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-weight: 500;
    line-height: 1.4;
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    /* 좌우 16px 통일 padding (모든 섹션 라인 맞춤) — 사용자 요청 #2 */
    padding: 0 16px calc(100px + env(safe-area-inset-bottom));
  }
  /* 모든 섹션이 좌우 padding 받도록 inline margin 무력화 */
  body > .topbar, body > .main-card, body > .bot-row, body > .bot-status-row,
  body > .section, body > .section-head, body > .market-grid, body > .quick-menu,
  body > #m-bots-down-banner, body > .desktop-grid, body > #m-persona-cards {
    margin-left: 0 !important; margin-right: 0 !important;
  }

  /* 데스크탑/태블릿도 모바일과 동일한 좁은 폭 (사용자 요청: 얇게) */
  @media (min-width: 768px) {
    body {
      max-width: 480px;
      padding: 16px 16px calc(110px + env(safe-area-inset-bottom)) !important;
    }
    .topbar { position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 12px 0; margin-top: -16px; }
    /* 보유/최근거래 세로 (1열) — 좁은 폭이므로 데스크 2열 무력화 */
    .desktop-grid { display: block; }
    .desktop-grid > .section { margin-bottom: 12px; }
    .tabbar { max-width: 460px; }
  }

  /* 스켈레톤 로딩 */
  @keyframes skel { 0%{background-position:-200px 0} 100%{background-position:200px 0} }
  .skel {
    background: linear-gradient(90deg, var(--line) 0px, #f0f3f6 40px, var(--line) 80px);
    background-size: 600px;
    animation: skel 1.4s ease-in-out infinite;
    border-radius: 6px;
    color: transparent !important;
    display: inline-block;
    min-width: 40px;
  }
  .empty-state {
    padding: 20px 12px;
    text-align: center;
    color: var(--text-3);
    font-size: 12px;
  }
  .updated-tag {
    font-size: 10px;
    color: var(--text-3);
    font-weight: 500;
  }
  /* 봇 상태 행 */
  .bot-status-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .bot-status-pill {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
  }
  .bot-status-pill .bsp-left { display:flex; align-items:center; gap:6px; }
  .bsp-dot { width:8px; height:8px; border-radius:50%; }
  .bsp-dot.run  { background: var(--green); box-shadow: 0 0 0 3px var(--green-bg); }
  .bsp-dot.stop { background: var(--text-3); }
  .bsp-dot.err  { background: var(--red); box-shadow: 0 0 0 3px var(--red-bg); }
  .bsp-mode { font-size:9px; padding:2px 6px; border-radius:4px; font-weight:800; }
  .bsp-mode.demo { background: var(--blue-bg); color: var(--blue); }
  .bsp-mode.real { background: var(--red-bg); color: var(--red); }

  /* 메인 카드 강화 */
  .main-card .main-amount { font-size: 32px; line-height: 1.1; letter-spacing: -1px; }
  @media (min-width: 768px) { .main-card .main-amount { font-size: 38px; } }

  /* SVG 아이콘 베이스 */
  .ico {
    width: 1em;
    height: 1em;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* 상단 헤더 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo .ico { font-size: 20px; color: var(--blue); }
  .header-icons { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    cursor: pointer;
    position: relative;
    border-radius: 8px;
  }
  .icon-btn:active { background: var(--line); }
  .icon-btn .ico { font-size: 22px; }
  .badge {
    position: absolute;
    background: var(--red);
    color: white;
    font-size: 9px;
    border-radius: 50%;
    width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    top: 6px;
    right: 6px;
  }

  /* 메인 자산 카드 */
  .main-card {
    margin: 8px 16px 16px;
    padding: 24px 20px 20px;
    background: var(--surface);
    border-radius: 16px;
  }
  .main-label {
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .main-amount {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .main-pnl {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 700;
  }
  .main-pnl .ico { font-size: 16px; }
  .pnl-up { color: var(--red); }
  .pnl-down { color: var(--blue); }
  .pnl-flat { color: var(--text-3); }
  .pnl-pct {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
    margin-left: 2px;
  }

  /* 봇 상태 카드 */
  .bot-row {
    display: flex;
    gap: 10px;
    margin: 0 16px 16px;
  }
  .bot-card {
    flex: 1;
    background: var(--surface);
    padding: 16px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .bot-card:active { transform: scale(0.98); }
  .bot-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .bot-name {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bot-name .ico {
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
  }
  .bot-name .coin-ico { background: var(--yellow-bg); color: var(--yellow); }
  .bot-name .stock-ico { background: var(--blue-bg); color: var(--blue); }
  .bot-status {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .running .status-dot { background: var(--green); }
  .running { color: var(--green); }
  .stopped .status-dot { background: var(--text-4); }
  .stopped { color: var(--text-4); }
  .bot-amount {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 3px;
  }
  .bot-pnl {
    font-size: 12px;
    font-weight: 600;
  }

  /* 빠른 메뉴 */
  .quick-menu {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 0 16px 16px;
    background: var(--surface);
    border-radius: 14px;
    padding: 16px 8px;
  }
  .quick-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 4px;
    cursor: pointer;
  }
  .quick-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quick-icon .ico { font-size: 22px; }
  .qi-blue { background: var(--blue-bg); color: var(--blue); }
  .qi-green { background: var(--green-bg); color: var(--green); }
  .qi-red { background: var(--red-bg); color: var(--red); }
  .qi-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .qi-purple { background: var(--purple-bg); color: var(--purple); }
  .quick-label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 600;
  }

  /* 섹션 */
  .section {
    background: var(--surface);
    margin: 0 16px 16px;
    border-radius: 14px;
    overflow: hidden;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px 12px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
  }
  .section-link {
    font-size: 12px;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .section-link .ico { font-size: 14px; }

  /* 종목/거래 리스트 */
  .item {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .item-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-right: 12px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .item-icon.eth { background: #627EEA20; color: #627EEA; }
  .item-icon.sent { background: #FF6B3520; color: #FF6B35; }
  .item-icon.usd { background: var(--blue-bg); color: var(--blue); }
  .item-icon.buy {
    background: var(--green-bg);
    color: var(--green);
  }
  .item-icon.buy .ico { font-size: 16px; }
  .item-icon.sell {
    background: var(--red-bg);
    color: var(--red);
  }
  .item-icon.sell .ico { font-size: 16px; }
  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 2px;
  }
  .item-sub {
    font-size: 12px;
    color: var(--text-3);
  }
  .item-right {
    text-align: right;
    flex-shrink: 0;
  }
  .item-amount {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .item-change {
    font-size: 12px;
    font-weight: 600;
  }

  /* 시장 미니 카드 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .market-cell {
    padding: 12px 6px;
    text-align: center;
    background: var(--card);
  }
  .market-name {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .market-value {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .market-change {
    font-size: 11px;
    font-weight: 600;
  }

  /* 하단 탭바 */
  .tabbar {
    position: fixed;
    bottom: max(16px, env(safe-area-inset-bottom));  /* 홈바와 안 겹치게 */
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 24px);
    max-width: 396px;
    background: var(--surface);
    display: flex;
    border-radius: 18px;  /* 둥근 플로팅 탭바 (토스 스타일) */
    box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    z-index: 100;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 14px;
    transition: background 0.15s;
  }
  .tab.active { color: var(--text-1); background: var(--bg); }
  .tab.active { color: var(--text-1); }
  .tab .ico { font-size: 22px; }
  .tab-label {
    font-size: 10px;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- SVG 심볼 정의 (한 번만 정의하고 재사용) -->
<svg width="0" height="0" style="position:absolute;">
  <defs>

    <!-- 화살표 위 (수익) -->

      <path d="M12 19V5"/>

      <path d="M9.5 13.5h4.5a2 2 0 0 1 0 4h-4.5v-4z"/>

    <!-- 주식 (라인 차트) -->

      <path d="M22 7l-9 9-4-4-7 7"/>

    <!-- 활동 (실시간) -->

      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>

    <!-- 지갑 (수익) -->
    <symbol id="i-wallet" viewBox="0 0 24 24">

      <path d="M19 7V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v2"/>

    <!-- 자가개선 (사이클) -->
    <symbol id="i-refresh" viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 0 0-15-6.7L3 8"/>
      <path d="M3 3v5h5"/>
      <path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/>

    <!-- 캘린더 -->
    <symbol id="i-calendar" viewBox="0 0 24 24">

      <polyline points="9 18 15 12 9 6"/>

    <!-- 홈 -->

      <polyline points="9 22 9 12 15 12 15 22"/>

    <!-- 차트 (시장) -->
    <symbol id="i-bar-chart" viewBox="0 0 24 24">
      <line x1="12" y1="20" x2="12" y2="10"/>
      <line x1="18" y1="20" x2="18" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="16"/>

    <!-- 봇 -->
    <symbol id="i-bot" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="10" rx="2"/>
      <circle cx="12" cy="5" r="2"/>
      <path d="M12 7v4"/>
      <line x1="8" y1="16" x2="8" y2="16"/>
      <line x1="16" y1="16" x2="16" y2="16"/>
    </symbol>

    <!-- 분석 (라인 차트 위 마그니파이어) -->
    <symbol id="i-analytics" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M7 12l3-3 4 4 6-6"/>
    </symbol>

    <!-- 더보기 -->
    <symbol id="i-menu" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="1"/>
      <circle cx="19" cy="12" r="1"/>
      <circle cx="5" cy="12" r="1"/>
    </symbol>

    <!-- 매수 (플러스) -->
    <symbol id="i-plus" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>

    <!-- 매도 (마이너스) -->
    <symbol id="i-minus" viewBox="0 0 24 24">
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>

    <!-- 자가개선 (반복 화살표) -->
    <symbol id="i-cpu" viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
      <rect x="9" y="9" width="6" height="6"/>
      <line x1="9" y1="2" x2="9" y2="4"/>
      <line x1="15" y1="2" x2="15" y2="4"/>
      <line x1="9" y1="20" x2="9" y2="22"/>
      <line x1="15" y1="20" x2="15" y2="22"/>
      <line x1="20" y1="9" x2="22" y2="9"/>
      <line x1="20" y1="14" x2="22" y2="14"/>
      <line x1="2" y1="9" x2="4" y2="9"/>
      <line x1="2" y1="14" x2="4" y2="14"/>
    </symbol>

    <!-- 🎯 타겟 (목표/판매예정) -->
    <symbol id="i-target" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10"/>
      <circle cx="12" cy="12" r="6"/>
      <circle cx="12" cy="12" r="2"/>
    </symbol>

    <div id="sheet-title" style="font-size:18px;font-weight:800;margin:10px 0 12px"></div>

    <!-- 봇 선택 토글 -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;background:var(--bg);padding:4px;border-radius:12px">
      <button id="sheet-tab-coin" onclick="switchBotSheet('coin')" style="padding:10px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer">🪙 코인봇</button>
      <button id="sheet-tab-stock" onclick="switchBotSheet('stock')" style="padding:10px;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer">📈 주식봇</button>
    </div>

    <!-- 잔고/오늘 손익 -->
    <div id="sheet-summary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px"></div>

    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:700">운영 모드</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
        <button data-mode="run" onclick="ctrlBot('run')" style="padding:12px;background:var(--green-bg);color:var(--green);border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">▶ 러닝</button>
        <button data-mode="soft" onclick="ctrlBot('soft')" style="padding:12px;background:var(--yellow-bg);color:var(--yellow);border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">⏸ 정리중지</button>
        <button data-mode="stop" onclick="ctrlBot('stop')" style="padding:12px;background:var(--red-bg);color:var(--red);border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer">⏹ 완전종료</button>
      </div>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:700">거래 모드</div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg);border-radius:10px">
        <div>
          <div id="sheet-mode-name" style="font-size:15px;font-weight:800">-</div>
          <div data-mode-sub style="font-size:11px;color:var(--text-3)">로딩...</div>
        </div>
        <button onclick="toggleTrade()" id="sheet-mode-btn" style="padding:10px 18px;background:var(--blue);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer">전환</button>
      </div>
    </div>

    <button onclick="emergencyBot()" style="width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:14px">🚨 긴급 전량 판매</button>

    <!-- 현재 보유 종목 + 청산 버튼 -->
    <div style="font-size:12px;color:var(--text-2);margin-bottom:6px;font-weight:700">현재 보유</div>
    <div id="sheet-positions" style="display:flex;flex-direction:column;gap:6px"></div>

    <button onclick="closeBotSheet()" style="width:100%;padding:12px;background:var(--bg);color:var(--text-2);border:none;border-radius:10px;font-weight:700;font-size:13px;margin-top:14px;cursor:pointer">닫기</button>
  </div>
</div>

<script>
const SYS_API = 'http://127.0.0.1:9000';
const BOT_APIS = {coin: 'http://127.0.0.1:9001', stock: 'http://127.0.0.1:9002'};
let _currentBot = null;

function openBotSheet(bot){
  document.getElementById('bot-sheet').style.display = 'flex';
  switchBotSheet(bot);
}

// ─── 거래 달력 ───
let _calData = null, _calMonth = null;  // {year, month}

async function openCalendarSheet(){
  openSheet('calendar-sheet');
  const now = new Date();
  _calMonth = {year: now.getFullYear(), month: now.getMonth()};
  document.getElementById('cal-day-detail').innerHTML = '';
  await renderCalendar();
}

function calMove(delta){
  if (!_calMonth) return;
  _calMonth.month += delta;
  if (_calMonth.month < 0) { _calMonth.month = 11; _calMonth.year -= 1; }
  if (_calMonth.month > 11) { _calMonth.month = 0; _calMonth.year += 1; }
  document.getElementById('cal-day-detail').innerHTML = '';
  renderCalendar();
}

async function renderCalendar(){
  if (!_calMonth) return;
  const mkt = document.getElementById('cal-market').value;
  const title = document.getElementById('cal-title');
  title.textContent = `${_calMonth.year}년 ${_calMonth.month + 1}월`;

  // 데이터 fetch (최근 60일 이내)
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:var(--text-3);font-size:12px">불러오는 중...</div>';
  let data = {days: {}, tunes: {}};
  if (IS_LOCAL) {
    try {
      const r = await fetch(`${SYS_API}/api/calendar?market=${mkt}&days=60`, {signal:AbortSignal.timeout(4000)});
      if (r.ok) data = await r.json();
    } catch (e) { console.warn('calendar fetch', e); }
  } else if (_fbDb) {
    // Firebase: status doc의 daily_pnl_7d만 사용 (제한적)
    const c = STATE_CACHE.coin || {}, s = STATE_CACHE.stock || {};
    const merge = (arr, tag) => (arr || []).forEach(d => {
      const k = d.date; if (!k) return;
      const day = data.days[k] = data.days[k] || {trades:0, wins:0, losses:0, pnl:0, by_persona:[], symbols:[]};
      day.trades += d.trades || 0; day.wins += d.wins || 0;
      day.losses += d.losses || 0; day.pnl += d.pnl || 0;
    });
    if (mkt === 'coin' || mkt === 'all') merge(c.daily_pnl_7d, 'coin');
    if (mkt === 'kr' || mkt === 'us' || mkt === 'all') merge(s.daily_pnl_7d, 'stock');
  }
  _calData = data;

  // 그리드 빌드
  const first = new Date(_calMonth.year, _calMonth.month, 1);
  const lastDay = new Date(_calMonth.year, _calMonth.month + 1, 0).getDate();
  const startDow = first.getDay();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push('<div></div>');
  const today = new Date();
  for (let d = 1; d <= lastDay; d++) {
    const dt = new Date(_calMonth.year, _calMonth.month, d);
    const ymd = `${_calMonth.year}-${String(_calMonth.month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = (data.days || {})[ymd];
    const tunes = (data.tunes || {})[ymd];
    const isToday = dt.toDateString() === today.toDateString();
    const isFuture = dt > today;
    let cellBg = 'var(--bg)', pnlTxt = '', tradesTxt = '';
    if (day) {
      const pnl = day.pnl || 0;
      if (pnl > 0)     { cellBg = 'rgba(240,68,82,0.15)'; pnlTxt = `<div style="font-size:9px;color:var(--red);font-weight:800;margin-top:1px">+${(pnl/10000).toFixed(1)}만</div>`; }
      else if (pnl < 0){ cellBg = 'rgba(49,130,246,0.15)'; pnlTxt = `<div style="font-size:9px;color:var(--blue);font-weight:800;margin-top:1px">${(pnl/10000).toFixed(1)}만</div>`; }
      else             { cellBg = 'rgba(139,151,161,0.10)'; }
      tradesTxt = `<div style="font-size:9px;color:var(--text-3);margin-top:1px">${day.trades}건</div>`;
    }
    if (isFuture) cellBg = 'transparent';
    const dotTune = tunes ? '<span style="position:absolute;top:3px;right:4px;width:5px;height:5px;background:var(--purple);border-radius:50%"></span>' : '';
    const todayBd = isToday ? 'border:2px solid var(--text-1)' : 'border:1px solid transparent';
    const dCol = dt.getDay() === 0 ? 'var(--red)' : dt.getDay() === 6 ? 'var(--blue)' : 'var(--text-1)';
    cells.push(`<div onclick="renderCalDay('${ymd}')" style="position:relative;background:${cellBg};${todayBd};border-radius:6px;padding:5px 2px;text-align:center;cursor:${isFuture?'default':'pointer'};min-height:48px;opacity:${isFuture?0.3:1}">
      <div style="font-size:11px;font-weight:700;color:${dCol}">${d}</div>
      ${pnlTxt}${tradesTxt}${dotTune}
    </div>`);
  }
  grid.innerHTML = cells.join('');
}

function renderCalDay(ymd){
  if (!_calData) return;
  const day = (_calData.days || {})[ymd];
  const tunes = (_calData.tunes || {})[ymd] || [];
  const box = document.getElementById('cal-day-detail');
  if (!day && tunes.length === 0) {
    box.innerHTML = `<div style="background:var(--bg);padding:14px;border-radius:10px;text-align:center;color:var(--text-3);font-size:12px">${ymd}<br><span style="font-size:11px">거래 없음</span></div>`;
    return;
  }
  let h = `<div style="background:var(--bg);padding:12px;border-radius:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:14px;font-weight:800">${ymd}</div>
      ${day ? `<div class="${pnlClass(day.pnl)}" style="font-size:14px;font-weight:800">${day.pnl >= 0 ? '+' : ''}${fmtKRW(day.pnl)}원</div>` : ''}
    </div>`;
  if (day) {
    h += `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px">
      <div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center">
        <div style="font-size:10px;color:var(--text-3)">거래</div>
        <div style="font-size:13px;font-weight:800">${day.trades}건</div>
      </div>
      <div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center">
        <div style="font-size:10px;color:var(--text-3)">익절</div>
        <div style="font-size:13px;font-weight:800;color:var(--red)">${day.wins}</div>
      </div>
      <div style="background:var(--surface);padding:8px;border-radius:6px;text-align:center">
        <div style="font-size:10px;color:var(--text-3)">손절</div>
        <div style="font-size:13px;font-weight:800;color:var(--blue)">${day.losses}</div>
      </div>
    </div>`;
    if (day.by_persona && day.by_persona.length > 0) {
      h += '<div style="font-size:11px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#i-mask"/></svg> 페르소나별</div>';
      h += day.by_persona.map(p => `<div style="display:flex;justify-content:space-between;padding:6px 8px;background:var(--surface);border-radius:6px;margin-bottom:3px;font-size:11px">
        <span><b>${p.persona}</b> ${p.trades}건</span>
        <span class="${pnlClass(p.pnl)}" style="font-weight:700">${p.pnl >= 0 ? '+' : ''}${fmtKRW(p.pnl)}원</span>
      </div>`).join('');
    }
    if (day.symbols && day.symbols.length > 0) {
      h += `<div style="margin-top:8px;font-size:10px;color:var(--text-3)">종목: ${day.symbols.slice(0, 8).join(', ')}${day.symbols.length > 8 ? ` +${day.symbols.length - 8}` : ''}</div>`;
    }
  }
  if (tunes.length > 0) {
    h += '<div style="font-size:11px;font-weight:700;margin:10px 0 4px;color:var(--purple);display:flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#i-wrench"/></svg> 자가개선</div>';
    h += tunes.map(t => `<div style="padding:6px 8px;background:var(--purple-bg, #F0EBFF);border-radius:6px;margin-bottom:3px;font-size:11px">
      <b style="display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#${t.market === 'coin' ? 'i-coin' : 'i-trending'}"/></svg> ${t.param || t.pattern}</b>: ${t.old} → <b style="color:var(--purple)">${t.new}</b>
    </div>`).join('');
  }
  h += '</div>';
  box.innerHTML = h;
  // 부드러운 스크롤
  setTimeout(() => box.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

// ─── 종목 상세 시트 ───
function openPositionSheet(bot, sym){
  const key = `${bot}|${sym}`;
  const p = (window._POS_INDEX || {})[key];
  if (!p) { appAlert({kind:'error', title:'종목 정보 없음', message:'다시 시도해주세요.'}); return; }
  const isCoin = bot === 'coin';
  const name = p._name || p.stock_name || sym;
  const persona = p.persona || p.profile || '-';
  const avg = +(p.entry_price || p.avg_price || 0);
  const cur = +(p.current_price || 0);
  const amt = +(p.amount || 0);
  const amtStr = isCoin ? amt.toFixed(6).replace(/\.?0+$/, '') : amt.toFixed(0);
  let pnl = p.pnl_pct;
  if (pnl == null) pnl = avg > 0 && cur > 0 ? ((cur-avg)/avg*100) : 0;
  const inv = p.notional_krw || p.krw_invested || (avg * amt);
  const curVal = isCoin ? (cur * amt) : (p.notional_krw || cur * amt * (p.fx_rate || 1));
  const pnlAmt = curVal - inv;
  const entryTs = p.entry_ts || p.entered_at || '';
  const dt = entryTs ? new Date(entryTs) : null;
  const dtStr = dt ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}` : '-';
  const heldMs = dt ? (Date.now() - dt.getTime()) : 0;
  const heldHrs = heldMs / 3600000;
  const heldStr = heldHrs >= 24 ? `${Math.floor(heldHrs/24)}일 ${Math.floor(heldHrs%24)}시간` : heldHrs >= 1 ? `${heldHrs.toFixed(1)}시간` : `${Math.round(heldMs/60000)}분`;

  // 페르소나별 판매 예정일/시간 캡 (Master Spec v2 §1)
  const PERSONA_CAP = {
    '단타맨': {h: 4,    label:'당일 청산 (4시간 캡)'},
    '스윙맨': {h: 120,  label:'1~5일 스윙 (5일 캡)'},
    '쿨마봇': {h: 720,  label:'EP 라이딩 (30일 캡, MA10 트레일)'},
    '존버맨': {h: 336,  label:'안전 자산 (14일 캡)'},
  };
  const cap = PERSONA_CAP[persona];
  let plannedExit = '미정 (모멘텀 기반)';
  if (cap && dt) {
    const exitDt = new Date(dt.getTime() + cap.h * 3600000);
    plannedExit = `${exitDt.getFullYear()}-${String(exitDt.getMonth()+1).padStart(2,'0')}-${String(exitDt.getDate()).padStart(2,'0')} ${String(exitDt.getHours()).padStart(2,'0')}:${String(exitDt.getMinutes()).padStart(2,'0')}`;
  }
  const pendingSell = p.pending_sell ? '🔴 판매 예약됨 (다음 사이클)' : '';

  // 분석: 모멘텀/손익/위치
  const profitTxt = pnl >= 0 ? `수익 +${pnl.toFixed(2)}%` : `손실 ${pnl.toFixed(2)}%`;
  let advice = '';
  if (pnl >= 5)        advice = '🟢 큰 수익 — 트레일링/MA 라이딩 중';
  else if (pnl >= 1)   advice = '🟢 수익 진행 — BE 도달 시 부분익절';
  else if (pnl >= -0.5) advice = '⚪ 보합 — 모멘텀 관찰';
  else if (pnl >= -1.5) advice = '🟡 손실 진입 — 손절선 -1.5% 임박';
  else                  advice = '🔴 손절 임박 — Spec §12 -1.5% 절대룰';

  const pnlCls = pnlClass(pnl);
  const sign = pnl >= 0 ? '+' : '';
  const aSign = pnlAmt >= 0 ? '+' : '';

  const html = `
    <div style="display:flex;align-items:center;gap:10px;margin:8px 0 14px">
      <div class="item-icon ${isCoin?'eth':'usd'}" style="width:42px;height:42px;font-size:13px">${sym.replace('KRW-','').slice(0,4)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:16px;font-weight:800">${name}</div>
        <div style="font-size:11px;color:var(--text-3);display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#${isCoin?'i-coin':'i-trending'}"/></svg> ${isCoin?'코인':'주식'} · ${persona}</div>
      </div>
      <div style="text-align:right">
        <div class="${pnlCls}" style="font-size:16px;font-weight:800">${sign}${pnl.toFixed(2)}%</div>
        <div class="${pnlCls}" style="font-size:11px;font-weight:700">${aSign}${fmtKRW(pnlAmt)}원</div>
      </div>
    </div>

    ${pendingSell ? `<div style="background:var(--red-bg);color:var(--red);padding:10px;border-radius:8px;font-size:12px;font-weight:700;text-align:center;margin-bottom:12px">${pendingSell}</div>` : ''}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div style="background:var(--bg);padding:10px;border-radius:8px">
        <div style="font-size:10px;color:var(--text-3);margin-bottom:2px">매입 단가</div>
        <div style="font-size:13px;font-weight:800">${fmtKRW(p.avg_price_krw || avg)}원</div>
      </div>
      <div style="background:var(--bg);padding:10px;border-radius:8px">
        <div style="font-size:10px;color:var(--text-3);margin-bottom:2px">현재가</div>
        <div style="font-size:13px;font-weight:800">${fmtKRW(isCoin?cur:(cur*(p.fx_rate||1)))}원</div>
      </div>
      <div style="background:var(--bg);padding:10px;border-radius:8px">
        <div style="font-size:10px;color:var(--text-3);margin-bottom:2px">수량</div>
        <div style="font-size:13px;font-weight:800">${amtStr}${isCoin?'':'주'}</div>
      </div>
      <div style="background:var(--bg);padding:10px;border-radius:8px">
        <div style="font-size:10px;color:var(--text-3);margin-bottom:2px">평가액</div>
        <div style="font-size:13px;font-weight:800">${fmtKRW(curVal)}원</div>
      </div>
    </div>

    <div style="background:var(--bg);padding:12px;border-radius:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text-3);display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#i-calendar"/></svg> 매입일자</span><b>${dtStr}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text-3)">⏱ 보유 기간</span><b>${heldStr}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text-3);display:inline-flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#i-target"/></svg> 판매 예정</span><b style="color:${cap?'var(--blue)':'var(--text-3)'}">${plannedExit}</b></div>
      ${cap ? `<div style="font-size:10px;color:var(--text-3);margin-top:4px">※ ${cap.label}</div>` : ''}
    </div>

    <div style="background:var(--bg);padding:12px;border-radius:10px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--text-3);margin-bottom:4px;display:flex;align-items:center;gap:4px"><svg width="11" height="11" style="stroke:currentColor;fill:none;stroke-width:2"><use href="#i-bar-chart"/></svg> 분석 (Master Spec v2)</div>
      <div style="font-size:13px;font-weight:700;line-height:1.5">${advice}</div>
      <div style="font-size:11px;color:var(--text-2);margin-top:6px">${profitTxt} · ${persona} 룰셋 적용 중</div>
    </div>

    ${(p.pattern || p.score) ? `<div style="background:var(--bg);padding:10px;border-radius:8px;margin-bottom:8px;font-size:11px">
      <div style="display:flex;justify-content:space-between"><span style="color:var(--text-3)">진입 패턴</span><b>${p.pattern || '-'}</b></div>
      ${p.score ? `<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="color:var(--text-3)">진입 점수</span><b>${p.score}점</b></div>` : ''}
    </div>` : ''}

    <button onclick="sellPosition('${bot}','${sym.replace(/'/g, "\\'")}','${name.replace(/'/g, "\\'")}')" ${p.pending_sell ? 'disabled' : ''}
      style="width:100%;padding:14px;background:${p.pending_sell?'var(--text-4)':'var(--red)'};color:#fff;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:${p.pending_sell?'not-allowed':'pointer'};margin-top:6px">
      ${p.pending_sell ? '<svg width="13" height="13" style="vertical-align:-2px;stroke:currentColor;fill:none;stroke-width:2"><use href="#i-hourglass"/></svg> 판매 예약됨' : '<svg width="13" height="13" style="vertical-align:-2px;stroke:currentColor;fill:none;stroke-width:2"><use href="#i-money"/></svg> 판매하기'}
    </button>
  `;

function fmtKRW(v){
  if (v == null || isNaN(v)) return '-';
  v = Math.round(+v);
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(2) + '억';
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
  return v.toLocaleString();
}
function fmtSign(v){
  if (v == null) return '-';
  return (v >= 0 ? '+' : '') + fmtKRW(v) + '원';
}

// ─── 커스텀 다이얼로그 (iOS 네이티브 confirm/alert 대체) ───
function _ensureDialogRoot(){
  let r = document.getElementById('app-dialog');
  if (r) return r;
  r = document.createElement('div');
  r.id = 'app-dialog';
  r.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:2000;align-items:center;justify-content:center;padding:20px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)';
  document.body.appendChild(r);
  return r;
}
function _closeDialog(){ const r = _ensureDialogRoot(); r.style.display = 'none'; r.innerHTML = ''; }

// 옵션: title, message, danger(true=빨강 강조), icon, primaryLabel, cancelLabel
function appConfirm(opts){
  return new Promise(resolve => {
    const r = _ensureDialogRoot();
    const o = typeof opts === 'string' ? {message: opts} : (opts || {});
    const danger = !!o.danger;
    const primary = o.primaryLabel || (danger ? '진행' : '확인');
    const cancel = o.cancelLabel || '취소';
    const icon = o.icon || (danger ? '⚠️' : '❓');
    const accent = danger ? 'var(--red)' : 'var(--blue)';
    r.innerHTML = `
      <div style="background:var(--surface);border-radius:18px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.35);animation:dlgIn .18s ease-out">
        <div style="padding:22px 22px 16px;text-align:center">
          <div style="font-size:34px;line-height:1;margin-bottom:10px">${icon}</div>
          ${o.title ? `<div style="font-size:16px;font-weight:800;margin-bottom:6px;color:var(--text-1)">${o.title}</div>` : ''}
          <div style="font-size:13px;color:var(--text-2);line-height:1.55;white-space:pre-wrap;text-align:left">${o.message || ''}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)">
          <button id="_dlg_cancel" style="padding:14px;background:var(--surface);border:none;font-size:14px;font-weight:700;color:var(--text-2);cursor:pointer">${cancel}</button>
          <button id="_dlg_ok" style="padding:14px;background:var(--surface);border:none;font-size:14px;font-weight:800;color:${accent};cursor:pointer">${primary}</button>
        </div>
      </div>`;
    r.style.display = 'flex';
    const onOk = () => { _closeDialog(); resolve(true); };
    const onCancel = () => { _closeDialog(); resolve(false); };
    r.querySelector('#_dlg_ok').onclick = onOk;
    r.querySelector('#_dlg_cancel').onclick = onCancel;
    r.onclick = (e) => { if (e.target === r) onCancel(); };
  });
}

function appAlert(opts){
  return new Promise(resolve => {
    const r = _ensureDialogRoot();
    const o = typeof opts === 'string' ? {message: opts} : (opts || {});
    const kind = o.kind || 'info';  // info | success | error | warn
    const icon = o.icon || ({info:'ℹ️', success:'✅', error:'❌', warn:'⚠️'}[kind]);
    const accent = ({info:'var(--blue)', success:'var(--green)', error:'var(--red)', warn:'var(--yellow)'}[kind]);
    r.innerHTML = `
      <div style="background:var(--surface);border-radius:18px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.35);animation:dlgIn .18s ease-out">
        <div style="padding:22px 22px 16px;text-align:center">
          <div style="font-size:34px;line-height:1;margin-bottom:10px">${icon}</div>
          ${o.title ? `<div style="font-size:16px;font-weight:800;margin-bottom:6px;color:var(--text-1)">${o.title}</div>` : ''}
          <div style="font-size:13px;color:var(--text-2);line-height:1.55;white-space:pre-wrap">${o.message || ''}</div>
        </div>
        <button id="_dlg_ok" style="width:100%;padding:14px;background:var(--surface);border:none;border-top:1px solid var(--line);font-size:14px;font-weight:800;color:${accent};cursor:pointer">확인</button>
      </div>`;
    r.style.display = 'flex';
    const close = () => { _closeDialog(); resolve(); };
    r.querySelector('#_dlg_ok').onclick = close;
    r.onclick = (e) => { if (e.target === r) close(); };
    if (o.autoCloseMs) setTimeout(close, o.autoCloseMs);
  });
}

(function _initDialog(){

  });
})();

function _alertId(a){ return (a.ts || '') + '|' + (a.title || '') + '|' + (a.body || '').slice(0,40); }
function _getDismissed(){ try { return new Set(JSON.parse(localStorage.getItem('alerts_dismissed') || '[]')); } catch { return new Set(); } }
function _saveDismissed(set){ localStorage.setItem('alerts_dismissed', JSON.stringify([...set].slice(-500))); }
function _activeAlerts(){
  const c = STATE_CACHE.coin || {}, s = STATE_CACHE.stock || {};
  const dismissed = _getDismissed();
  return [
    ...(c.alerts || []).map(a => ({...a, _bot:'coin'})),
    ...(s.alerts || []).map(a => ({...a, _bot:'stock'})),
  ].filter(a => !dismissed.has(_alertId(a)))
   .sort((a,b) => (b.ts || '').localeCompare(a.ts || ''))
   .slice(0, 50);
}

function dismissAlert(id){
  const set = _getDismissed(); set.add(id); _saveDismissed(set);
  openAlertsSheet(); _refreshAlertsBadge();
}
async function dismissAllAlerts(){
  const ok = await appConfirm({
    title:'모두 읽음 처리', icon:'🔔',
    message:'현재 표시된 알림 전체를 읽음 처리합니다.',
    primaryLabel:'모두 읽음',
  });
  if (!ok) return;
  const set = _getDismissed();
  _activeAlerts().forEach(a => set.add(_alertId(a)));
  _saveDismissed(set);
  openAlertsSheet(); _refreshAlertsBadge();
}
function _refreshAlertsBadge(){
  const badge = document.getElementById('m-alerts-badge');
  if (!badge) return;
  const n = _activeAlerts().length;
  if (n > 0) { badge.textContent = n > 99 ? '99+' : n; badge.style.display = 'flex'; }
  else       { badge.style.display = 'none'; }
}

    if (sum.personas.length > 0) {

async function hardReload(){
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    const url = new URL(location.href);
    url.searchParams.set('_cb', Date.now());
    location.replace(url.toString());
  } catch (e) { location.reload(true); }
}

const STATE_CACHE = {coin:null, stock:null};

function fmtPrice(v){
  if (v == null) return '-';
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(2) + '억';
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
  return Math.round(v).toLocaleString();
}
function pnlClass(v){ return v > 0 ? 'pnl-up' : v < 0 ? 'pnl-down' : 'pnl-flat'; }

function renderMobile(d){
  const c = d.coin || {}, s = d.stock || {};
  STATE_CACHE.coin = c; STATE_CACHE.stock = s;
  _refreshAlertsBadge();
  const totalBal = (c.balance || 0) + (s.balance || 0);
  const todayPnl = (c.today_pnl || 0) + (s.today_pnl || 0);
  const totalSeed = (c.initial_balance || 0) + (s.initial_balance || 0);
  const todayPct = totalSeed > 0 ? (todayPnl / totalSeed * 100) : 0;

  setText('m-total-balance', fmtKRW(totalBal) + '원');
  setText('m-total-pnl', fmtSign(todayPnl));
  setText('m-total-pnl-pct', (todayPct >= 0 ? '+' : '') + todayPct.toFixed(2) + '%');
  const pnlRow = document.getElementById('m-total-pnl-row');
  if (pnlRow) { pnlRow.classList.remove('pnl-up','pnl-down','pnl-flat'); pnlRow.classList.add(pnlClass(todayPnl)); }

  // 봇 잔고/오늘손익은 main-card 메인 외에는 표시 안 함 (페르소나 카드로 대체)
  // 하단 봇 시트 / refreshSheetSummary 가 동일 데이터 사용

  // ─── 페르소나 4개 카드 (홈) ───

    {key:'단타맨', icon:'⚡', cls:'qi-blue',   color:'#3182F6'},
    {key:'스윙맨', icon:'🛡', cls:'qi-green',  color:'#1B9856'},
    {key:'쿨마봇', icon:'🚀', cls:'qi-purple', color:'#8B5CF6'},
    {key:'존버맨', icon:'🌳', cls:'qi-yellow', color:'#F8AE3C'},
  ];
  const cStats = (c.persona_stats || []), sStats = (s.persona_stats || []);
  const findStat = (name) => {
    const all = [...cStats, ...sStats].filter(x => x.persona === name);
    if (all.length === 0) return null;
    return all.reduce((a, b) => ({
      persona: name,
      trades: (a.trades || 0) + (b.trades || 0),
      wins: (a.wins || 0) + (b.wins || 0),
      total_pnl: (a.total_pnl || 0) + (b.total_pnl || 0),
    }));
  };
  const personaBox = document.getElementById('m-persona-cards');
  if (personaBox) {
    personaBox.innerHTML = PERSONA_LIST.map(p => {
      const st = findStat(p.key);
      const trades = st?.trades || 0;
      const wins = st?.wins || 0;
      const wr = trades > 0 ? Math.round(wins / trades * 100) : 0;
      const pnl = st?.total_pnl || 0;
      const sign = pnl >= 0 ? '+' : '';
      const cls = pnl > 0 ? 'pnl-up' : pnl < 0 ? 'pnl-down' : 'pnl-flat';
      const wrColor = trades === 0 ? 'var(--text-3)' : (wr >= 60 ? 'var(--green)' : wr >= 40 ? 'var(--yellow)' : 'var(--red)');
      return `<div onclick="window.location.href='persona_analytics.html?v=20260507-0017&persona=${encodeURIComponent(p.key)}'"
        style="background:var(--surface);padding:12px;border-radius:14px;cursor:pointer;border:1px solid var(--line);transition:transform .12s">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:18px">${p.icon}</span>
            <span style="font-weight:800;font-size:13px">${p.key}</span>
          </div>
          <span style="font-size:10px;color:${wrColor};font-weight:700">${trades>0?wr+'%':'-'}</span>
        </div>
        <div class="${cls}" style="font-size:14px;font-weight:800">${sign}${fmtKRW(pnl)}원</div>
        <div style="font-size:10px;color:var(--text-3);margin-top:2px">${trades}건 · 30일</div>
      </div>`;
    }).join('');
  }

  // 봇 카드 (잔고/PnL/상태/DEMO·REAL 토글 — 인라인 컨트롤)
  ['coin','stock'].forEach((bot, i) => {
    const data = i === 0 ? c : s;
    // 잔고
    setText(`m-${bot}-balance`, fmtKRW(data.balance || 0) + '원');
    // 오늘 PnL
    const pnl = data.today_pnl || 0;
    const pnlEl = document.getElementById(`m-${bot}-pnl`);
    if (pnlEl) {
      pnlEl.textContent = (pnl >= 0 ? '+' : '') + fmtKRW(pnl) + '원 오늘';
      pnlEl.className = 'bot-pnl ' + pnlClass(pnl);
    }
    // 상태 dot
    const stEl = document.getElementById(`m-${bot}-status`);
    if (stEl) {
      const live = data._live;
      const mode = data.bot_mode;
      let label, klass;
      if (mode === 'running')        { label='운영중'; klass='running'; }
      else if (mode === 'soft_stop') { label='정리중'; klass='running'; }
      else if (mode === 'stopped')   { label='정지';   klass='stopped'; }
      else if (live)                 { label='온라인'; klass='running'; }
      else                           { label='오프라인'; klass='stopped'; }
      stEl.className = 'bot-status ' + klass;
      stEl.innerHTML = `<span class="status-dot"></span><span>${label}</span>`;
    }
    // DEMO/REAL 토글 버튼
    const mb = document.getElementById(`m-${bot}-mode-btn`);
    if (mb) {

    }
  }

  // 최근 거래 (양봇 합산, 최신순 10건)
  const allTr = [
    ...(c.recent_trades || []).map(t => ({...t, _bot:'coin', _sym: t.coin})),
    ...(s.recent_trades || []).map(t => ({...t, _bot:'stock', _sym: t.stock_name || t.stock})),
  ].sort((a,b) => (b.ts || b.created_at || '').localeCompare(a.ts || a.created_at || '')).slice(0, 10);
  const tList = document.getElementById('m-trades-list');
  if (tList) {
    if (allTr.length === 0) {
      tList.innerHTML = '<div class="item"><div class="item-body"><div class="item-name" style="color:var(--text-3)">거래 없음</div></div></div>';
    } else {
      tList.innerHTML = allTr.map(t => {
        const isBuy = (t.side || '').toLowerCase().startsWith('b');
        const time = (t.ts || t.created_at || '').slice(11, 16);
        const sym = t._sym || '-';
        const persona = t.persona || t.profile || '';
        const pnl = t.pnl || 0;
        const pct = t.pnl_pct != null ? (Math.abs(t.pnl_pct) < 1 ? t.pnl_pct * 100 : t.pnl_pct) : 0;
        return `<div class="item">
          <div class="item-icon ${isBuy ? 'buy' : 'sell'}">
            <svg class="ico"><use href="#${isBuy ? 'i-plus' : 'i-minus'}"/></svg>
          </div>
          <div class="item-body">
            <div class="item-name">${sym}</div>
            <div class="item-sub">${time} · ${persona}</div>
          </div>
          <div class="item-right">
            <div class="item-amount ${pnlClass(pnl)}">${pnl >= 0 ? '+' : ''}${fmtKRW(pnl)}원</div>
            <div class="item-change ${pnlClass(pct)}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</div>
          </div>
        </div>`;
      }).join('');
    }
  }
}

// 30초 폴링
fetchAndRender();
setInterval(fetchAndRender, 30000);

// ─── 딥링크 라우팅 (외부 알림/에이전트 버튼에서 이 사이트로 진입) ───
// 사용 예:
//   ?open=alerts                      → 알림 시트
//   ?open=settings                    → 설정 시트
//   ?open=improve                     → 자가개선 시트
//   ?open=calendar                    → 거래 달력
//   ?open=calendar&date=2026-05-04    → 달력 + 해당 일자 상세
//   ?open=bot&bot=coin                → 봇 컨트롤 (coin|stock)
//   ?open=position&bot=coin&sym=KRW-BTC → 종목 상세
//   ?open=persona&market=kr           → 페르소나 비중 페이지로 redirect
//
// 기존 동작 무영향: 파라미터 없으면 0 영향. 파싱은 데이터 도착 후 1회만.
async function _runDeepLink() {
  const params = new URLSearchParams(location.search);
  const open = params.get('open');
  if (!open) return;
  // 데이터 1회 로드 대기 (보유종목 인덱스 채워질 때까지)
  for (let i = 0; i < 20; i++) {
    if (STATE_CACHE.coin || STATE_CACHE.stock) break;
    await new Promise(r => setTimeout(r, 250));
  }
  try {
    switch (open) {
      case 'alerts':   openAlertsSheet(); break;
      case 'settings': openSettingsSheet(); break;
      case 'improve':  openImproveSheet(); break;
      case 'calendar': {
        await openCalendarSheet();
        const dt = params.get('date');
        if (dt) setTimeout(() => renderCalDay(dt), 300);
        break;
      }
      case 'bot': {
        const bot = params.get('bot') || 'coin';
        if (bot === 'coin' || bot === 'stock') openBotSheet(bot);
        break;
      }
      case 'position': {
        const bot = params.get('bot'), sym = params.get('sym');
        if (bot && sym) openPositionSheet(bot, sym);
        break;
      }
      case 'persona': {
        const m = params.get('market') || 'coin';
        location.href = `persona_settings.html?tab=${encodeURIComponent(m)}`;
        break;
      }
    }
    // URL 정리 (뒤로가기/공유 시 시트 재오픈 방지) — 옵션
    if (params.get('keep') !== '1') {
      const clean = location.pathname + location.hash;
      history.replaceState({}, '', clean);
    }
  } catch (e) { console.warn('[deeplink]', e); }
}
_runDeepLink();

// 데스크탑 사이즈로 리사이즈 시 index.html 로
window.addEventListener('resize', () => {
  if (window.innerWidth >= 768 && window.location.pathname.includes('mobile')) {
    window.location.replace('index.html');
  }
});
</script>
