<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFFFFF">
<title>두근 트레이딩</title>
<link rel="preconnect" href="https://firestore.googleapis.com">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

  :root {
    --bg: #F2F4F6;
    --surface: #FFFFFF;
    --line: #E5E8EB;
    --text-1: #191F28;
    --text-2: #4E5968;
    --text-3: #8B95A1;
    --text-4: #B0B8C1;
    --blue: #3182F6;
    --blue-bg: #E8F3FF;
    --red: #F04452;
    --red-bg: #FFE9EA;
    --green: #1B9856;
    --green-bg: #E5F5EC;
    --yellow: #F8AE3C;
    --yellow-bg: #FFF4D6;
    --purple: #8B5CF6;
    --purple-bg: #F0EBFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { font-size: 15px; }

  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: 'Pretendard', -apple-system, sans-serif;
    font-weight: 500;
    line-height: 1.4;
    max-width: 420px;
    margin: 0 auto;
    min-height: 100vh;
    padding-bottom: calc(100px + env(safe-area-inset-bottom));  /* 플로팅 탭바 + 홈바 */
  }

  /* SVG 아이콘 베이스 */
  .ico {
    width: 1em;
    height: 1em;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  /* 상단 헤더 */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 20px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 17px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .logo .ico { font-size: 20px; color: var(--blue); }
  .header-icons { display: flex; gap: 6px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    cursor: pointer;
    position: relative;
    border-radius: 8px;
  }
  .icon-btn:active { background: var(--line); }
  .icon-btn .ico { font-size: 22px; }
  .badge {
    position: absolute;
    background: var(--red);
    color: white;
    font-size: 9px;
    border-radius: 50%;
    width: 14px; height: 14px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    top: 6px;
    right: 6px;
  }

  /* 메인 자산 카드 */
  .main-card {
    margin: 8px 16px 16px;
    padding: 24px 20px 20px;
    background: var(--surface);
    border-radius: 16px;
  }
  .main-label {
    font-size: 13px;
    color: var(--text-2);
    margin-bottom: 6px;
  }
  .main-amount {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .main-pnl {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 700;
  }
  .main-pnl .ico { font-size: 16px; }
  .pnl-up { color: var(--red); }
  .pnl-down { color: var(--blue); }
  .pnl-flat { color: var(--text-3); }
  .pnl-pct {
    font-size: 13px;
    color: var(--text-3);
    font-weight: 500;
    margin-left: 2px;
  }

  /* 봇 상태 카드 */
  .bot-row {
    display: flex;
    gap: 10px;
    margin: 0 16px 16px;
  }
  .bot-card {
    flex: 1;
    background: var(--surface);
    padding: 16px 14px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .bot-card:active { transform: scale(0.98); }
  .bot-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .bot-name {
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .bot-name .ico {
    font-size: 16px;
    padding: 4px;
    border-radius: 6px;
  }
  .bot-name .coin-ico { background: var(--yellow-bg); color: var(--yellow); }
  .bot-name .stock-ico { background: var(--blue-bg); color: var(--blue); }
  .bot-status {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .running .status-dot { background: var(--green); }
  .running { color: var(--green); }
  .stopped .status-dot { background: var(--text-4); }
  .stopped { color: var(--text-4); }
  .bot-amount {
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 3px;
  }
  .bot-pnl {
    font-size: 12px;
    font-weight: 600;
  }

  /* 빠른 메뉴 */
  .quick-menu {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin: 0 16px 16px;
    background: var(--surface);
    border-radius: 14px;
    padding: 16px 8px;
  }
  .quick-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 4px;
    cursor: pointer;
  }
  .quick-icon {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .quick-icon .ico { font-size: 22px; }
  .qi-blue { background: var(--blue-bg); color: var(--blue); }
  .qi-green { background: var(--green-bg); color: var(--green); }
  .qi-red { background: var(--red-bg); color: var(--red); }
  .qi-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .qi-purple { background: var(--purple-bg); color: var(--purple); }
  .quick-label {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 600;
  }

  /* 섹션 */
  .section {
    background: var(--surface);
    margin: 0 16px 16px;
    border-radius: 14px;
    overflow: hidden;
  }
  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px 12px;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
  }
  .section-link {
    font-size: 12px;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .section-link .ico { font-size: 14px; }

  /* 종목/거래 리스트 */
  .item {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .item-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-right: 12px;
    font-weight: 700;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .item-icon.eth { background: #627EEA20; color: #627EEA; }
  .item-icon.sent { background: #FF6B3520; color: #FF6B35; }
  .item-icon.usd { background: var(--blue-bg); color: var(--blue); }
  .item-icon.buy {
    background: var(--green-bg);
    color: var(--green);
  }
  .item-icon.buy .ico { font-size: 16px; }
  .item-icon.sell {
    background: var(--red-bg);
    color: var(--red);
  }
  .item-icon.sell .ico { font-size: 16px; }
  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-1);
    margin-bottom: 2px;
  }
  .item-sub {
    font-size: 12px;
    color: var(--text-3);
  }
  .item-right {
    text-align: right;
    flex-shrink: 0;
  }
  .item-amount {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .item-change {
    font-size: 12px;
    font-weight: 600;
  }

  /* 시장 미니 카드 */
  .market-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
  }
  .market-cell {
    padding: 14px 8px;
    text-align: center;
    border-right: 1px solid var(--line);
  }
  .market-cell:last-child { border-right: none; }
  .market-name {
    font-size: 11px;
    color: var(--text-3);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .market-value {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .market-change {
    font-size: 11px;
    font-weight: 600;
  }

  /* 하단 탭바 */
  .tabbar {
    position: fixed;
    bottom: max(16px, env(safe-area-inset-bottom));  /* 홈바와 안 겹치게 */
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 24px);
    max-width: 396px;
    background: var(--surface);
    display: flex;
    border-radius: 18px;  /* 둥근 플로팅 탭바 (토스 스타일) */
    box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
    z-index: 100;
    padding: 4px;
  }
  .tab {
    flex: 1;
    padding: 10px 4px;
    text-align: center;
    color: var(--text-3);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border-radius: 14px;
    transition: background 0.15s;
  }
  .tab.active { color: var(--text-1); background: var(--bg); }
  .tab.active { color: var(--text-1); }
  .tab .ico { font-size: 22px; }
  .tab-label {
    font-size: 10px;
    font-weight: 700;
  }
</style>
</head>
<body>

<!-- SVG 심볼 정의 (한 번만 정의하고 재사용) -->
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <!-- 차트 (로고용) -->
    <symbol id="i-chart" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M7 14l4-4 4 4 5-5"/>
    </symbol>

    <!-- 알림 -->
    <symbol id="i-bell" viewBox="0 0 24 24">
      <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
      <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
    </symbol>

    <!-- 설정 -->
    <symbol id="i-settings" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </symbol>

    <!-- 화살표 위 (수익) -->
    <symbol id="i-arrow-up" viewBox="0 0 24 24">
      <path d="M12 19V5"/>
      <path d="M5 12l7-7 7 7"/>
    </symbol>

    <!-- 화살표 아래 (손실) -->
    <symbol id="i-arrow-down" viewBox="0 0 24 24">
      <path d="M12 5v14"/>
      <path d="M19 12l-7 7-7-7"/>
    </symbol>

    <!-- 코인 -->
    <symbol id="i-coin" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/>
      <path d="M9.5 9.5h4a2 2 0 0 1 0 4h-4v-4z"/>
      <path d="M9.5 13.5h4.5a2 2 0 0 1 0 4h-4.5v-4z"/>
    </symbol>

    <!-- 주식 (라인 차트) -->
    <symbol id="i-trending" viewBox="0 0 24 24">
      <path d="M22 7l-9 9-4-4-7 7"/>
      <path d="M16 7h6v6"/>
    </symbol>

    <!-- 활동 (실시간) -->
    <symbol id="i-activity" viewBox="0 0 24 24">
      <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
    </symbol>

    <!-- 지갑 (수익) -->
    <symbol id="i-wallet" viewBox="0 0 24 24">
      <path d="M19 7H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
      <path d="M16 14h.01"/>
      <path d="M19 7V5a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v2"/>
    </symbol>

    <!-- 자가개선 (사이클) -->
    <symbol id="i-refresh" viewBox="0 0 24 24">
      <path d="M21 12a9 9 0 0 0-15-6.7L3 8"/>
      <path d="M3 3v5h5"/>
      <path d="M3 12a9 9 0 0 0 15 6.7l3-2.7"/>
      <path d="M16 16h5v5"/>
    </symbol>

    <!-- 캘린더 -->
    <symbol id="i-calendar" viewBox="0 0 24 24">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
    </symbol>

    <!-- 화살표 우측 -->
    <symbol id="i-chevron-right" viewBox="0 0 24 24">
      <polyline points="9 18 15 12 9 6"/>
    </symbol>

    <!-- 홈 -->
    <symbol id="i-home" viewBox="0 0 24 24">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </symbol>

    <!-- 차트 (시장) -->
    <symbol id="i-bar-chart" viewBox="0 0 24 24">
      <line x1="12" y1="20" x2="12" y2="10"/>
      <line x1="18" y1="20" x2="18" y2="4"/>
      <line x1="6" y1="20" x2="6" y2="16"/>
    </symbol>

    <!-- 봇 -->
    <symbol id="i-bot" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="10" rx="2"/>
      <circle cx="12" cy="5" r="2"/>
      <path d="M12 7v4"/>
      <line x1="8" y1="16" x2="8" y2="16"/>
      <line x1="16" y1="16" x2="16" y2="16"/>
    </symbol>

    <!-- 분석 (라인 차트 위 마그니파이어) -->
    <symbol id="i-analytics" viewBox="0 0 24 24">
      <path d="M3 3v18h18"/>
      <path d="M7 12l3-3 4 4 6-6"/>
    </symbol>

    <!-- 더보기 -->
    <symbol id="i-menu" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="1"/>
      <circle cx="19" cy="12" r="1"/>
      <circle cx="5" cy="12" r="1"/>
    </symbol>

    <!-- 매수 (플러스) -->
    <symbol id="i-plus" viewBox="0 0 24 24">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>

    <!-- 매도 (마이너스) -->
    <symbol id="i-minus" viewBox="0 0 24 24">
      <line x1="5" y1="12" x2="19" y2="12"/>
    </symbol>

    <!-- 자가개선 (반복 화살표) -->
    <symbol id="i-cpu" viewBox="0 0 24 24">
      <rect x="4" y="4" width="16" height="16" rx="2" ry="2"/>
      <rect x="9" y="9" width="6" height="6"/>
      <line x1="9" y1="2" x2="9" y2="4"/>
      <line x1="15" y1="2" x2="15" y2="4"/>
      <line x1="9" y1="20" x2="9" y2="22"/>
      <line x1="15" y1="20" x2="15" y2="22"/>
      <line x1="20" y1="9" x2="22" y2="9"/>
      <line x1="20" y1="14" x2="22" y2="14"/>
      <line x1="2" y1="9" x2="4" y2="9"/>
      <line x1="2" y1="14" x2="4" y2="14"/>
    </symbol>
  </defs>
</svg>

<!-- 상단 헤더 -->
<div class="header">
  <div class="logo" onclick="location.reload()">
    <svg class="ico"><use href="#i-chart"/></svg>
    두근 트레이딩
  </div>
  <div class="header-icons">
    <div class="icon-btn" onclick="openAlertsSheet()">
      <svg class="ico"><use href="#i-bell"/></svg>
      <span class="badge" id="m-alerts-badge" style="display:none">0</span>
    </div>
    <div class="icon-btn" onclick="openSettingsSheet()">
      <svg class="ico"><use href="#i-settings"/></svg>
    </div>
  </div>
</div>

<!-- 메인 자산 카드 -->
<div class="main-card">
  <div class="main-label">총 자산</div>
  <div class="main-amount" id="m-total-balance">-</div>
  <div class="main-pnl" id="m-total-pnl-row">
    <span id="m-total-pnl">-</span>
    <span class="pnl-pct" id="m-total-pnl-pct"></span>
  </div>
</div>

<!-- 봇 2개 카드 — 클릭 시 컨트롤 시트 -->
<div class="bot-row">
  <div class="bot-card" onclick="openBotSheet('coin')">
    <div class="bot-head">
      <div class="bot-name">
        <svg class="ico coin-ico"><use href="#i-coin"/></svg>
        코인봇
      </div>
      <div class="bot-status running" id="m-coin-status">
        <span class="status-dot"></span>
        <span>운영중</span>
      </div>
    </div>
    <div class="bot-amount" id="m-coin-balance">-</div>
    <div class="bot-pnl" id="m-coin-pnl">-</div>
    <div style="margin-top:6px;font-size:10px;color:var(--text-3);text-align:right">탭 → 컨트롤</div>
  </div>
  <div class="bot-card" onclick="openBotSheet('stock')">
    <div class="bot-head">
      <div class="bot-name">
        <svg class="ico stock-ico"><use href="#i-trending"/></svg>
        주식봇
      </div>
      <div class="bot-status running" id="m-stock-status">
        <span class="status-dot"></span>
        <span>운영중</span>
      </div>
    </div>
    <div class="bot-amount" id="m-stock-balance">-</div>
    <div class="bot-pnl" id="m-stock-pnl">-</div>
    <div style="margin-top:6px;font-size:10px;color:var(--text-3);text-align:right">탭 → 컨트롤</div>
  </div>
</div>

<!-- 빠른 메뉴 -->
<div class="quick-menu">
  <div class="quick-item" onclick="openBotSheet('coin')">
    <div class="quick-icon qi-blue"><svg class="ico"><use href="#i-activity"/></svg></div>
    <div class="quick-label">코인봇</div>
  </div>
  <div class="quick-item" onclick="openBotSheet('stock')">
    <div class="quick-icon qi-green"><svg class="ico"><use href="#i-wallet"/></svg></div>
    <div class="quick-label">주식봇</div>
  </div>
  <div class="quick-item" onclick="openImproveSheet()">
    <div class="quick-icon qi-red"><svg class="ico"><use href="#i-cpu"/></svg></div>
    <div class="quick-label">자가개선</div>
  </div>
  <div class="quick-item" onclick="window.location.href='persona_settings.html'">
    <div class="quick-icon qi-yellow"><svg class="ico"><use href="#i-calendar"/></svg></div>
    <div class="quick-label">페르소나</div>
  </div>
</div>

<!-- 시장 한눈에 -->
<div class="section">
  <div class="section-head">
    <div class="section-title">시장</div>
    <div class="section-link" onclick="fetchAndRender()" style="cursor:pointer">↻ 새로고침</div>

<script>
const SYS_API = 'http://127.0.0.1:9000';
const BOT_APIS = {coin: 'http://127.0.0.1:9001', stock: 'http://127.0.0.1:9002'};
let _currentBot = null;

function openBotSheet(bot){
  _currentBot = bot;
  document.getElementById('sheet-title').textContent = bot === 'coin' ? '🪙 코인봇 컨트롤' : '📈 주식봇 컨트롤';
  document.getElementById('bot-sheet').style.display = 'flex';
  refreshSheetPositions();
  refreshSheetMode();
}

async function refreshSheetMode(){
  if (!_currentBot) return;
  try {
    const r = await fetch(`${BOT_APIS[_currentBot]}/health`, {signal:AbortSignal.timeout(2500)});
    if (!r.ok) return;
    const d = await r.json();
    const botMode = d.bot_mode || 'unknown';
    const tradeMode = (d.trade_mode || 'demo').toUpperCase();
    // 운영 모드 active highlight
    ['run','soft','stop'].forEach(m => {
      const btn = document.querySelector(`#bot-sheet button[data-mode="${m}"]`);
      if (btn) {
        const active = (m==='run' && botMode==='running') || (m==='soft' && botMode==='soft_stop') || (m==='stop' && botMode==='stopped');
        btn.style.outline = active ? '2.5px solid var(--text-1)' : 'none';
        btn.style.outlineOffset = active ? '-2.5px' : '0';
      }
    });
    // 거래 모드 라벨 + 버튼
    setText('sheet-mode-name', tradeMode);
    const subEl = document.querySelector('#bot-sheet [data-mode-sub]');
    if (subEl) subEl.textContent = tradeMode === 'DEMO' ? '시뮬레이션 (가상매매)' : '⚠️ 실전매매 (진짜돈)';
    const tradeBtn = document.getElementById('sheet-mode-btn');
    if (tradeBtn) {
      tradeBtn.textContent = tradeMode === 'DEMO' ? 'REAL 전환' : 'DEMO 전환';
      tradeBtn.style.background = tradeMode === 'DEMO' ? 'var(--red)' : 'var(--blue)';
    }
  } catch (e) { console.error('mode fetch', e); }
}
function closeBotSheet(){
  document.getElementById('bot-sheet').style.display = 'none';
  _currentBot = null;
}
async function ctrlBot(action){
  if (!_currentBot) return;
  const labels = {run:'러닝 시작', soft:'정리중지 (보유는 청산까지)', stop:'완전 종료'};
  if (action === 'stop' && !confirm(`${_currentBot} 봇 ${labels[action]}?`)) return;
  if (action === 'soft' && !confirm(`${labels[action]}?`)) return;
  try {
    const r = await fetch(`${BOT_APIS[_currentBot]}/mode/${action}`, {method:'POST'});
    if (r.ok) {
      alert(`✅ ${labels[action]}`);
      refreshSheetMode();
      setTimeout(fetchAndRender, 1500);
    } else alert(`❌ HTTP ${r.status}`);
  } catch (e) { alert(`❌ ${e.message}`); }
}
async function toggleTrade(){
  if (!_currentBot) return;
  const cur = document.getElementById('sheet-mode-name').textContent;
  const target = cur === 'DEMO' ? 'real' : 'demo';
  if (target === 'real' && !confirm('⚠️ REAL 모드 = 진짜 돈으로 매매!\n진행하시겠습니까?')) return;
  try {
    const r = await fetch(`${BOT_APIS[_currentBot]}/trade/${target}`, {method:'POST'});
    if (r.ok) {
      alert(`✅ ${target.toUpperCase()} 모드 전환됨`);
      refreshSheetMode();
      setTimeout(fetchAndRender, 1500);
    } else alert(`❌ HTTP ${r.status}`);
  } catch (e) { alert(`❌ ${e.message}`); }
}
async function emergencyBot(){
  if (!_currentBot) return;
  if (!confirm('🚨 보유 전량 즉시 청산.\n취소 불가, 진행?')) return;
  try {
    const r = await fetch(`${BOT_APIS[_currentBot]}/emergency`, {method:'POST'});
    if (r.ok) {
      alert(`🚨 긴급청산 실행`);
      refreshSheetPositions();
      setTimeout(fetchAndRender, 2000);
    }
  } catch (e) { alert(`❌ ${e.message}`); }
}
async function refreshSheetPositions(){
  if (!_currentBot) return;
  try {
    const r = await fetch(`${SYS_API}/status/${_currentBot}`, {signal:AbortSignal.timeout(2500)});
    if (!r.ok) return;
    const d = await r.json();
    const pos = d.current_positions || d.positions || [];
    const box = document.getElementById('sheet-positions');
    if (pos.length === 0) {
      box.innerHTML = '<div style="text-align:center;color:var(--text-3);padding:14px;font-size:12px">보유 없음</div>';
      return;
    }
    box.innerHTML = pos.map(p => {
      const sym = p.coin || p.stock_name || p.stock || '-';
      const symKey = p.coin || p.stock;
      const pnl = p.pnl_pct != null ? p.pnl_pct : 0;
      const pnlSign = pnl >= 0 ? '+' : '';
      const cls = pnl > 0 ? 'pnl-up' : pnl < 0 ? 'pnl-down' : 'pnl-flat';
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border-radius:10px">
        <div style="overflow:hidden;flex:1">
          <div style="font-weight:700;font-size:13px">${sym}</div>
          <div class="${cls}" style="font-size:11px">${pnlSign}${pnl.toFixed(2)}%</div>
        </div>
        <button onclick="closePos('${symKey}','${sym}')" style="padding:8px 14px;background:var(--red);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer">청산</button>
      </div>`;
    }).join('');
  } catch (e) { console.error(e); }
}
async function closePos(symbol, name){
  if (!confirm(`${name} 청산 예약?\n다음 사이클(60초 내) 자동 매도.`)) return;
  try {
    const r = await fetch(`${SYS_API}/api/positions/close`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({bot:_currentBot, symbol})
    });
    const d = await r.json();
    if (d.ok) { alert(`✅ ${name} 청산 예약됨`); refreshSheetPositions(); }
    else alert(`❌ ${d.error || '실패'}`);
  } catch (e) { alert(`❌ ${e.message}`); }
}
function fmtKRW(v){
  if (v == null || isNaN(v)) return '-';
  v = Math.round(+v);
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(2) + '억';
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
  return v.toLocaleString();
}
function fmtSign(v){
  if (v == null) return '-';
  return (v >= 0 ? '+' : '') + fmtKRW(v) + '원';
}
function setText(id, txt){
  const el = document.getElementById(id);
  if (el) el.textContent = txt;
}

// 외부 사이트는 Firebase, 로컬은 직접 fetch
const IS_LOCAL = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname.startsWith('192.168');
const FIREBASE_CFG = {
  apiKey: "AIzaSyAF6096bC-Q04qWXh5MjVsuJGhYBy76agM",
  authDomain: "datemap-759bf.firebaseapp.com",
  projectId: "datemap-759bf",
  storageBucket: "datemap-759bf.firebasestorage.app",
  messagingSenderId: "833273999923",
  appId: "1:833273999923:web:2696d0363c223c6bbbe946"
};
let _fbDb = null;
function initFirebase() {
  if (_fbDb || !window.firebase) return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CFG);
    _fbDb = firebase.firestore();
    // 실시간 구독 (코인 + 주식)
    _fbDb.collection('trading_status').doc('coin').onSnapshot(snap => {
      if (snap.exists) { _lastFb.coin = snap.data(); renderMobile(_lastFb); }
    });
    _fbDb.collection('trading_status').doc('stock').onSnapshot(snap => {
      if (snap.exists) { _lastFb.stock = snap.data(); renderMobile(_lastFb); }
    });
    console.log('[mobile] Firebase 실시간 구독 시작');
  } catch (e) { console.error('Firebase init err', e); }
}
const _lastFb = {coin:null, stock:null};

async function fetchAndRender(){
  // 1. 로컬: system_api 직접 fetch
  if (IS_LOCAL) {
    let coin = null, stock = null;
    try { const r = await fetch('http://127.0.0.1:9000/status/coin', {signal:AbortSignal.timeout(2500)}); if (r.ok) coin = await r.json(); } catch {}
    try { const r = await fetch('http://127.0.0.1:9000/status/stock', {signal:AbortSignal.timeout(2500)}); if (r.ok) stock = await r.json(); } catch {}
    if (coin || stock) renderMobile({coin, stock});
    return;
  }
  // 2. 외부: Firebase 구독 (자동, onSnapshot)
  initFirebase();
}

// 시트 헬퍼
function closeSheet(id){ document.getElementById(id).style.display = 'none'; }
function openSheet(id){ document.getElementById(id).style.display = 'flex'; }

function openAlertsSheet(){
  openSheet('alerts-sheet');
  const c = STATE_CACHE.coin || {}, s = STATE_CACHE.stock || {};
  const all = [
    ...(c.alerts || []).slice(0, 20).map(a => ({...a, _bot:'🪙'})),

  } else {
    box.innerHTML = all.map(a => {
      const sev = a.severity || 'info';
      const bg = sev === 'danger' ? 'var(--red-bg)' : sev === 'warn' ? 'var(--yellow-bg)' : 'var(--bg)';
      return `<div style="padding:10px;background:${bg};border-radius:8px;margin-bottom:6px;font-size:12px">

        <div style="color:var(--text-2);margin-top:2px">${a.body || ''}</div>
        <div style="font-size:10px;color:var(--text-3);margin-top:4px">${(a.ts || '').slice(5,16).replace('T',' ')}</div>
      </div>`;
    }).join('');
  }
  // 알림 카운트 갱신
  const badge = document.getElementById('m-alerts-badge');
  if (badge && all.length > 0) {
    badge.textContent = all.length > 99 ? '99+' : all.length;
    badge.style.display = 'flex';
  }
}

function openImproveSheet(){
  openSheet('improve-sheet');
  const c = STATE_CACHE.coin || {}, s = STATE_CACHE.stock || {};
  const tunes = [...(c.tune_history || []), ...(s.tune_history || [])];
  const meta = c.meta_diagnosis || s.meta_diagnosis || {};
  const personas = [...(c.persona_stats || []), ...(s.persona_stats || [])];
  let html = '<div style="font-size:13px;font-weight:700;margin-bottom:8px">🔬 메타진단</div>';
  html += `<div style="background:var(--bg);padding:10px;border-radius:8px;font-size:11px;margin-bottom:12px">${meta.summary || '데이터 누적 중'}</div>`;
  html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px">🛠 자가개선 변경 로그</div>';
  if (tunes.length === 0) {
    html += '<div style="color:var(--text-3);font-size:12px;padding:12px;text-align:center">변경 없음</div>';
  } else {
    html += tunes.slice(0, 5).map(t => `<div style="padding:8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:11px">
      <b>${t.param || t.pattern}</b>: ${t.old_value} → <span style="color:var(--blue)">${t.new_value}</span>
    </div>`).join('');
  }
  html += '<div style="font-size:13px;font-weight:700;margin:12px 0 8px">🎭 페르소나별 성과</div>';
  if (personas.length === 0) {
    html += '<div style="color:var(--text-3);font-size:12px;padding:12px;text-align:center">데이터 없음</div>';
  } else {
    html += personas.map(p => `<div style="display:flex;justify-content:space-between;padding:8px;background:var(--bg);border-radius:6px;margin-bottom:4px;font-size:11px">
      <span><b>${p.persona}</b> ${p.trades}건 (${p.winrate}%)</span>
      <span class="${pnlClass(p.total_pnl)}" style="font-weight:700">${p.total_pnl >= 0 ? '+' : ''}${fmtKRW(p.total_pnl)}원</span>
    </div>`).join('');
  }
  document.getElementById('improve-content').innerHTML = html;
}

function openSettingsSheet(){ openSheet('settings-sheet'); }

async function hardReload(){
  try {
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      for (const r of regs) await r.unregister();
    }
    if ('caches' in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
    const url = new URL(location.href);
    url.searchParams.set('_cb', Date.now());
    location.replace(url.toString());
  } catch (e) { location.reload(true); }
}

const STATE_CACHE = {coin:null, stock:null};

function fmtPrice(v){
  if (v == null) return '-';
  if (Math.abs(v) >= 100000000) return (v/100000000).toFixed(2) + '억';
  if (Math.abs(v) >= 10000) return (v/10000).toFixed(0) + '만';
  return Math.round(v).toLocaleString();
}
function pnlClass(v){ return v > 0 ? 'pnl-up' : v < 0 ? 'pnl-down' : 'pnl-flat'; }

function renderMobile(d){
  const c = d.coin || {}, s = d.stock || {};
  STATE_CACHE.coin = c; STATE_CACHE.stock = s;
  // 알림 카운트 업데이트
  const totalAlerts = (c.alerts || []).length + (s.alerts || []).length;
  const badge = document.getElementById('m-alerts-badge');
  if (badge) {
    if (totalAlerts > 0) {
      badge.textContent = totalAlerts > 99 ? '99+' : totalAlerts;
      badge.style.display = 'flex';
    } else { badge.style.display = 'none'; }
  }
  const totalBal = (c.balance || 0) + (s.balance || 0);
  const todayPnl = (c.today_pnl || 0) + (s.today_pnl || 0);
  const totalSeed = (c.initial_balance || 0) + (s.initial_balance || 0);
  const todayPct = totalSeed > 0 ? (todayPnl / totalSeed * 100) : 0;

  setText('m-total-balance', fmtKRW(totalBal) + '원');
  setText('m-total-pnl', fmtSign(todayPnl));
  setText('m-total-pnl-pct', (todayPct >= 0 ? '+' : '') + todayPct.toFixed(2) + '%');
  const pnlRow = document.getElementById('m-total-pnl-row');
  if (pnlRow) { pnlRow.classList.remove('pnl-up','pnl-down','pnl-flat'); pnlRow.classList.add(pnlClass(todayPnl)); }

  setText('m-coin-balance', fmtKRW(c.balance || 0) + '원');
  const cPnl = c.today_pnl || 0;
  const cEl = document.getElementById('m-coin-pnl');
  if (cEl) { cEl.textContent = (cPnl >= 0 ? '+' : '') + fmtKRW(cPnl) + '원 오늘'; cEl.className = 'bot-pnl ' + pnlClass(cPnl); }
  setText('m-stock-balance', fmtKRW(s.balance || 0) + '원');
  const sPnl = s.today_pnl || 0;
  const sEl = document.getElementById('m-stock-pnl');
  if (sEl) { sEl.textContent = (sPnl >= 0 ? '+' : '') + fmtKRW(sPnl) + '원 오늘'; sEl.className = 'bot-pnl ' + pnlClass(sPnl); }

  // 봇 가동 상태
  ['coin','stock'].forEach((bot, i) => {
    const data = i === 0 ? c : s;
    const stEl = document.getElementById(`m-${bot}-status`);
    if (stEl) {
      const running = (data.bot_mode === 'running');
      const trade = (data.trade_mode || 'demo').toUpperCase();
      stEl.className = 'bot-status ' + (running ? 'running' : 'stopped');
      const badgeColor = trade === 'REAL' ? 'var(--red)' : 'var(--blue)';
      stEl.innerHTML = `<span class="status-dot"></span><span>${running ? '운영중' : '정지'}</span>
        <span style="margin-left:4px;padding:1px 5px;background:${badgeColor};color:#fff;border-radius:4px;font-size:9px;font-weight:800">${trade}</span>`;
    }
  });

  // 시장 (macro)
  const macro = c.macro || s.macro || {};
  const mkts = [
    {key:'btc', name:'BTC', src: macro.btc},
    {key:'kospi', name:'KOSPI', src: macro.kospi},
    {key:'nasdaq', name:'NASDAQ', src: macro.nasdaq},
  ];
  const mGrid = document.getElementById('m-market-grid');
  if (mGrid) {
    mGrid.innerHTML = mkts.map(m => {
      const v = m.src?.value, ch = m.src?.chg_pct;
      return `<div class="market-cell">
        <div class="market-name">${m.name}</div>
        <div class="market-value">${fmtPrice(v)}</div>
        <div class="market-change ${pnlClass(ch || 0)}">${ch != null ? (ch>=0?'+':'') + ch.toFixed(2) + '%' : '-'}</div>
      </div>`;
    }).join('');
  }

  // 보유 종목 (양봇 합산)
  const cPos = c.current_positions || c.positions || [];
  const sPos = s.positions || [];
  const allPos = [
    ...cPos.map(p => ({...p, _bot:'coin', _sym: p.coin, _name: p.coin})),
    ...sPos.map(p => ({...p, _bot:'stock', _sym: p.stock, _name: p.stock_name || p.stock})),
  ];
  setText('m-holdings-count', `· ${allPos.length}건`);
  const hList = document.getElementById('m-holdings-list');
  if (hList) {
    if (allPos.length === 0) {
      hList.innerHTML = '<div class="item"><div class="item-body"><div class="item-name" style="color:var(--text-3)">보유 없음</div></div></div>';
    } else {
      hList.innerHTML = allPos.map(p => {
        const sym = p._sym || '-';
        const name = p._name || sym;
        const persona = p.persona || p.profile || '-';
        const cur = p.current_price || 0;
        const avg = +(p.entry_price || p.avg_price || 0);
        let pnl = p.pnl_pct;
        if (pnl == null) pnl = avg > 0 && cur > 0 ? ((cur-avg)/avg*100) : 0;
        const inv = p.notional_krw || p.krw_invested || (avg * (+p.amount || 0));
        const amt = (+p.amount || 0).toFixed(p._bot === 'coin' ? 4 : 0);
        const iconCls = p._bot === 'coin' ? 'eth' : 'usd';
        const sign = pnl >= 0 ? '+' : '';
        return `<div class="item" onclick="openBotSheet('${p._bot}')">
          <div class="item-icon ${iconCls}">${sym.replace('KRW-','').slice(0,4)}</div>
          <div class="item-body">
            <div class="item-name">${name}</div>
            <div class="item-sub">${fmtKRW(avg)}원 · ${amt}개 · ${persona}</div>
          </div>
          <div class="item-right">
            <div class="item-amount">${fmtKRW(inv)}원</div>
            <div class="item-change ${pnlClass(pnl)}">${sign}${pnl.toFixed(2)}%</div>
          </div>
        </div>`;
      }).join('');
    }
  }

  // 최근 거래 (양봇 합산, 최신순 10건)
  const allTr = [
    ...(c.recent_trades || []).map(t => ({...t, _bot:'coin', _sym: t.coin})),
    ...(s.recent_trades || []).map(t => ({...t, _bot:'stock', _sym: t.stock_name || t.stock})),
  ].sort((a,b) => (b.ts || b.created_at || '').localeCompare(a.ts || a.created_at || '')).slice(0, 10);
  const tList = document.getElementById('m-trades-list');
  if (tList) {
    if (allTr.length === 0) {
      tList.innerHTML = '<div class="item"><div class="item-body"><div class="item-name" style="color:var(--text-3)">거래 없음</div></div></div>';
    } else {
      tList.innerHTML = allTr.map(t => {
        const isBuy = (t.side || '').toLowerCase().startsWith('b');
        const time = (t.ts || t.created_at || '').slice(11, 16);
        const sym = t._sym || '-';
        const persona = t.persona || t.profile || '';
        const pnl = t.pnl || 0;
        const pct = t.pnl_pct != null ? (Math.abs(t.pnl_pct) < 1 ? t.pnl_pct * 100 : t.pnl_pct) : 0;
        return `<div class="item">
          <div class="item-icon ${isBuy ? 'buy' : 'sell'}">
            <svg class="ico"><use href="#${isBuy ? 'i-plus' : 'i-minus'}"/></svg>
          </div>
          <div class="item-body">
            <div class="item-name">${sym}</div>
            <div class="item-sub">${time} · ${persona}</div>
          </div>
          <div class="item-right">
            <div class="item-amount ${pnlClass(pnl)}">${pnl >= 0 ? '+' : ''}${fmtKRW(pnl)}원</div>
            <div class="item-change ${pnlClass(pct)}">${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%</div>
          </div>
        </div>`;
      }).join('');
    }
  }
}

// 30초 폴링
fetchAndRender();
setInterval(fetchAndRender, 30000);

// 데스크탑 사이즈로 리사이즈 시 index.html 로
window.addEventListener('resize', () => {
  if (window.innerWidth >= 768 && window.location.pathname.includes('mobile')) {
    window.location.replace('index.html');
  }
});
