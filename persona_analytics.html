<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>페르소나 통합 대시보드</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

:root {
  --bg: #F2F4F6;
  --surface: #FFFFFF;
  --line: #E5E8EB;
  --text-1: #191F28;
  --text-2: #4E5968;
  --text-3: #8B95A1;
  --text-4: #B0B8C1;
  --blue: #3182F6;
  --blue-bg: #E8F3FF;
  --red: #F04452;
  --red-bg: #FFE9EA;
  --green: #1B9856;
  --green-bg: #E5F5EC;
  --yellow: #F8AE3C;
  --yellow-bg: #FFF4D6;
  --purple: #8B5CF6;
  --purple-bg: #F0EBFF;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: 'Pretendard', -apple-system, sans-serif;
  font-weight: 500;
  line-height: 1.4;
  max-width: 420px;
  margin: 0 auto;
  min-height: 100vh;
  padding-bottom: 80px;
}

.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 50;
}
.h-title {
  font-size: 17px;
  font-weight: 700;
}
.h-actions {
  display: flex;
  gap: 4px;
}
.h-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-2);
}
.h-btn:active { background: var(--line); }
.h-btn svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* 페르소나 탭 */
.persona-tabs {
  display: flex;
  gap: 6px;
  padding: 0 16px 12px;
  overflow-x: auto;
}
.persona-tabs::-webkit-scrollbar { display: none; }
.p-tab {
  flex-shrink: 0;
  padding: 10px 16px;
  background: var(--surface);
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  border: 1px solid var(--line);
}
.p-tab.active {
  background: var(--text-1);
  color: var(--surface);
  border-color: var(--text-1);
}
.p-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

/* 페르소나 메인 카드 */
.persona-main {
  margin: 0 16px 12px;
  background: var(--surface);
  border-radius: 16px;
  overflow: hidden;
}
.pm-head {
  padding: 16px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line);
}
.pm-name {
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}
.pm-name-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
.pm-status {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--green);
}
.pm-status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--green);
}

/* 통계 그리드 */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  border-bottom: 1px solid var(--line);
}
.stat-cell {
  padding: 14px 18px;
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}
.stat-cell:nth-child(2n) { border-right: none; }
.stat-cell:nth-last-child(-n+2) { border-bottom: none; }
.stat-label {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 4px;
}
.stat-value {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.stat-sub {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 500;
  margin-top: 2px;
}
.stat-up { color: var(--red); }
.stat-down { color: var(--blue); }
.stat-flat { color: var(--text-3); }

/* 미니 차트 */
.mini-chart {
  padding: 14px 18px;
  background: var(--bg);
}
.mc-head {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
}
.mc-bars {
  display: flex;
  align-items: end;
  gap: 4px;
  height: 40px;
}
.mc-bar {
  flex: 1;
  background: var(--blue);
  border-radius: 2px 2px 0 0;
  position: relative;
}
.mc-bar.win { background: var(--red); }
.mc-bar.loss { background: var(--blue); opacity: 0.6; }

/* 섹션 */
.section {
  margin: 0 16px 12px;
  background: var(--surface);
  border-radius: 14px;
  overflow: hidden;
}
.s-head {
  padding: 14px 18px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line);
}
.s-title {
  font-size: 13px;
  font-weight: 700;
}
.s-count {
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
}

/* 보유 종목 */
.position-item {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}
.position-item:last-child { border-bottom: none; }
.pi-icon {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
  letter-spacing: -0.3px;
}
.pi-eth { background: rgba(98, 126, 234, 0.15); color: #627EEA; }
.pi-btc { background: rgba(247, 147, 26, 0.15); color: #F7931A; }
.pi-sol { background: rgba(20, 241, 149, 0.15); color: #14F195; }
.pi-body {
  flex: 1;
  min-width: 0;
}
.pi-name {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 2px;
}
.pi-sub {
  font-size: 11px;
  color: var(--text-3);
  display: flex;
  gap: 6px;
  align-items: center;
}
.pi-time {
  font-size: 10px;
  color: var(--text-4);
}
.pi-right {
  text-align: right;
  flex-shrink: 0;
}
.pi-amount {
  font-size: 14px;
  font-weight: 700;
}
.pi-pnl {
  font-size: 12px;
  font-weight: 600;
}

/* 검토 중 카테고리 */
.watching-grid {
  padding: 12px 18px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.wg-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px 12px;
}
.wg-cat {
  font-size: 10px;
  color: var(--text-3);
  font-weight: 600;
  margin-bottom: 4px;
}
.wg-symbols {
  font-size: 12px;
  font-weight: 600;
  color: var(--text-1);
  line-height: 1.4;
}
.wg-score {
  font-size: 11px;
  color: var(--purple);
  font-weight: 700;
  margin-top: 4px;
}

/* 예상 진입 */
.expected-item {
  padding: 12px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.expected-item:last-child { border-bottom: none; }
.ei-left {
  display: flex;
  align-items: center;
  gap: 10px;
}
.ei-symbol {
  font-size: 14px;
  font-weight: 700;
}
.ei-reason {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.ei-tag {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--blue-bg);
  color: var(--blue);
}
.ei-tag.warn { background: var(--yellow-bg); color: #b8860b; }
.ei-right {
  text-align: right;
}
.ei-prob {
  font-size: 13px;
  font-weight: 800;
}
.ei-time {
  font-size: 10px;
  color: var(--text-3);
}

/* 내보내기 */
.export-section {
  margin: 0 16px 12px;
  background: var(--surface);
  border-radius: 14px;
  padding: 16px 18px;
}
.export-title {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 12px;
}
.export-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.export-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 14px 8px;
  background: var(--bg);
  border-radius: 10px;
  cursor: pointer;
  border: none;
}
.export-btn:active { transform: scale(0.97); }
.export-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.export-icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}
.export-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
}

/* 시드 슬롯 미니 */
.slot-mini {
  margin: 0 16px 12px;
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 18px;
}
.sm-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 12px;
}
.sm-row:last-child { margin-bottom: 0; }
.sm-label {
  width: 50px;
  font-weight: 600;
  font-size: 12px;
}
.sm-bar-bg {
  flex: 1;
  background: var(--bg);
  border-radius: 4px;
  height: 6px;
  overflow: hidden;
}
.sm-bar {
  height: 100%;
  border-radius: 4px;
}
.sm-pct {
  width: 60px;
  text-align: right;
  font-size: 11px;
  color: var(--text-3);
  font-weight: 600;
}

</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute;">
  <defs>
    <symbol id="i-back" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></symbol>
    <symbol id="i-share" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></symbol>
    <symbol id="i-download" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></symbol>
    <symbol id="i-csv" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></symbol>
    <symbol id="i-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></symbol>
    <symbol id="i-text" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></symbol>
    <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
    <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></symbol>
  </defs>
</svg>

<div class="header">
  <div class="h-btn"><svg><use href="#i-back"/></svg></div>
  <div class="h-title">페르소나 분석</div>
  <div class="h-actions">
    <div class="h-btn"><svg><use href="#i-share"/></svg></div>
    <div class="h-btn"><svg><use href="#i-download"/></svg></div>
  </div>
</div>

<div class="persona-tabs">
  <div class="p-tab active">
    <div class="p-dot" style="background: #8B5CF6;"></div>
    쿨마봇
  </div>
  <div class="p-tab">
    <div class="p-dot" style="background: #1B9856;"></div>
    스윙맨
  </div>
  <div class="p-tab">
    <div class="p-dot" style="background: #3182F6;"></div>
    단타맨
  </div>
  <div class="p-tab">
    <div class="p-dot" style="background: #F8AE3C;"></div>
    존버맨
  </div>
</div>

<div class="persona-main">
  <div class="pm-head">
    <div class="pm-name">
      <div class="pm-name-dot" style="background: #8B5CF6;"></div>
      쿨마봇 (정통 EP)
    </div>
    <div class="pm-status">
      <div class="pm-status-dot"></div>
      운영중
    </div>
  </div>
  
  <div class="stat-grid">
    <div class="stat-cell">
      <div class="stat-label">승률 (30일)</div>
      <div class="stat-value">—</div>
      <div class="stat-sub">불러오는 중...</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">손익비 R:R</div>
      <div class="stat-value">—</div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">누적 수익</div>
      <div class="stat-value">—</div>
      <div class="stat-sub"></div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">평균 보유</div>
      <div class="stat-value">—</div>
      <div class="stat-sub"></div>
    </div>
  </div>
  
  <div class="mini-chart">
    <div class="mc-head">
      <span>최근 14일 일별 P&L</span>
      <span>—</span>
    </div>
    <div class="mc-bars">
      <div style="width:100%;text-align:center;align-self:center;color:var(--text-3);font-size:11px">불러오는 중...</div>
    </div>
  </div>
</div>

<div class="slot-mini">
  <div style="font-size: 12px; font-weight: 700; margin-bottom: 10px;">시드 슬롯 사용</div>
  <div class="sm-row">
    <div class="sm-label">사용중</div>
    <div class="sm-bar-bg">
      <div class="sm-bar" style="width: 0%; background: var(--line);"></div>
    </div>
    <div class="sm-pct">—</div>
  </div>
  <div class="sm-row">
    <div class="sm-label">가용</div>
    <div class="sm-bar-bg">
      <div class="sm-bar" style="width: 0%; background: var(--line);"></div>
    </div>
    <div class="sm-pct">—</div>
  </div>
</div>

<div class="section">
  <div class="s-head">
    <div class="s-title">보유 종목</div>
    <div class="s-count">불러오는 중...</div>
  </div>
</div>

<div class="section">
  <div class="s-head">
    <div class="s-title">검토 중 (카테고리)</div>
    <div class="s-count">불러오는 중...</div>
  </div>
  <div class="watching-grid"></div>
</div>

<div class="section">
  <div class="s-head">
    <div class="s-title">진입 예상</div>
    <div class="s-count">불러오는 중...</div>
  </div>
  <!-- 동적: expected-item JS로 채움 -->
  <div style="display:none">
    <div class="expected-item">
      <div class="ei-left">
        <div></div>
      </div>
    </div>
  </div>
</div>

<!-- 전체 분석 리포트 (Claude 분석용) -->
<div class="export-section">
  <div class="export-title">📊 전체 분석 리포트</div>
  <div style="font-size:11px;color:var(--text-3);margin-bottom:10px">
    기간:
    <select id="export-period" style="padding:3px 8px;border:1px solid var(--line);border-radius:6px;font-size:11px;background:var(--surface);margin-left:4px">
      <option value="7">최근 7일</option>
      <option value="30" selected>최근 30일</option>
      <option value="90">최근 90일</option>
      <option value="9999">전체</option>
    </select>
  </div>
  <button onclick="exportFullReport('zip')" style="width:100%;padding:14px;background:var(--text-1);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;margin-bottom:8px">
    📦 ZIP 다운로드 (Claude 업로드용)
  </button>
  <div style="font-size:11px;color:var(--text-3);text-align:center;margin-bottom:14px;line-height:1.5">
    💡 ZIP 받아서 Claude.ai에 업로드 →<br>페르소나/룰/시장 종합 분석 자동
  </div>
  <div style="font-size:11px;color:var(--text-3);text-align:center;margin-bottom:8px">또는 개별 다운로드</div>
  <div class="export-grid">
    <button class="export-btn" onclick="exportFullReport('md')">
      <div class="export-icon" style="background: var(--purple-bg); color: var(--purple);"><svg><use href="#i-text"/></svg></div>
      <div class="export-label">MD 리포트</div>
    </button>
    <button class="export-btn" onclick="exportFullReport('json')">
      <div class="export-icon" style="background: var(--blue-bg); color: var(--blue);"><svg><use href="#i-csv"/></svg></div>
      <div class="export-label">JSON 데이터</div>
    </button>
    <button class="export-btn" onclick="exportPersonaCSV()">
      <div class="export-icon" style="background: var(--green-bg); color: var(--green);"><svg><use href="#i-csv"/></svg></div>
      <div class="export-label">CSV (현재 페르소나)</div>
    </button>
    <button class="export-btn" onclick="copyPersonaText()">
      <div class="export-icon" style="background: var(--yellow-bg); color: #b8860b;"><svg><use href="#i-text"/></svg></div>
      <div class="export-label">텍스트 복사</div>
    </button>
  </div>
</div>

<!-- 페르소나 비교 라인차트 + 기간 필터 -->
<div class="section" id="cmp-section" style="margin: 0 16px 12px;">
  <div class="s-head">
    <div class="s-title">페르소나별 누적 매출</div>
    <div style="display:flex;gap:4px">
      <button class="cmp-range" data-d="7"  style="padding:4px 10px;border:1px solid var(--line);background:var(--surface);border-radius:6px;font-size:11px;cursor:pointer">7일</button>
      <button class="cmp-range active" data-d="30" style="padding:4px 10px;border:1px solid var(--text-1);background:var(--text-1);color:#fff;border-radius:6px;font-size:11px;cursor:pointer">30일</button>
      <button class="cmp-range" data-d="90" style="padding:4px 10px;border:1px solid var(--line);background:var(--surface);border-radius:6px;font-size:11px;cursor:pointer">90일</button>
    </div>
  </div>
  <svg id="cmp-svg" viewBox="0 0 320 140" style="width:100%;height:140px;display:block;background:var(--bg);border-radius:8px"></svg>
  <div id="cmp-legend" style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;flex-wrap:wrap;gap:6px"></div>
</div>

<!-- 종목 상세 시트 (보유 클릭 시) -->
<div id="pa-position-sheet" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:flex-end;justify-content:center" onclick="if(event.target===this)closePosSheet()">
  <div style="background:var(--surface);width:100%;max-width:420px;border-radius:20px 20px 0 0;padding:14px 18px max(18px,env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto">
    <div style="text-align:center;margin-bottom:8px"><div style="width:36px;height:4px;background:var(--text-4);border-radius:2px;margin:0 auto"></div></div>
    <div id="pa-pos-content"></div>
    <button onclick="closePosSheet()" style="width:100%;padding:12px;background:var(--bg);color:var(--text-2);border:none;border-radius:10px;font-weight:700;font-size:13px;margin-top:14px;cursor:pointer">닫기</button>
  </div>
</div>

<!-- 커스텀 다이얼로그 (확인/알림) -->
<div id="pa-dialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;padding:20px"></div>

<script>
// ─── 두근봇 데이터 바인딩 (디자인 변경 X, 컨텐츠만 동적) ───
const _h = location.hostname;
const IS_LOCAL_PA = location.protocol === 'file:' || _h === '127.0.0.1' || _h === 'localhost' || _h.startsWith('192.');
const API_BASE_PA = IS_LOCAL_PA ? 'http://127.0.0.1:9000' : '';
const USE_FB_PA = !IS_LOCAL_PA;

const PERSONAS_META = {
  '쿨마봇': {color:'#8B5CF6', desc:'정통 EP', icoCls:'pi-eth'},
  '스윙맨': {color:'#1B9856', desc:'1~5일 스윙', icoCls:'pi-btc'},
  '단타맨': {color:'#3182F6', desc:'당일 청산', icoCls:'pi-sol'},
  '존버맨': {color:'#F8AE3C', desc:'안전 자산', icoCls:'pi-eth'},
};
const SYM_KO = {
  'KRW-BTC':'비트코인','KRW-ETH':'이더리움','KRW-SOL':'솔라나','KRW-XRP':'리플',
  'KRW-DOGE':'도지','KRW-ADA':'에이다','KRW-AVAX':'아발란체','KRW-NEAR':'니어',
  'KRW-APT':'앱토스','KRW-SUI':'수이','KRW-ARB':'아비트럼','KRW-OP':'옵티미즘',
};

const params = new URLSearchParams(location.search);
let CUR_PERSONA = params.get('persona') || '쿨마봇';
let CUR_MARKET  = params.get('market')  || 'coin';

function fmtKRW(v) {
  if (!v && v !== 0) return '-';
  const abs = Math.abs(v);
  if (abs >= 100000000) return (v/100000000).toFixed(2) + '억';
  if (abs >= 10000)     return (v/10000).toFixed(1) + '만';
  return Math.round(v).toLocaleString();
}

// Firebase 초기화 (외부 호스트만)
const _FB_CFG_PA = {
  apiKey: "AIzaSyAF6096bC-Q04qWXh5MjVsuJGhYBy76agM",
  authDomain: "datemap-759bf.firebaseapp.com",
  projectId: "datemap-759bf",
  storageBucket: "datemap-759bf.firebasestorage.app",
  messagingSenderId: "833273999923",
  appId: "1:833273999923:web:2696d0363c223c6bbbe946",
};
let _fbDbPA = null;
async function _initFirebasePA() {
  if (!USE_FB_PA || _fbDbPA) return _fbDbPA;
  if (typeof firebase === 'undefined') {
    await new Promise((res, rej) => {
      let n = 0;
      const t = setInterval(() => {
        if (typeof firebase !== 'undefined') { clearInterval(t); res(); }
        else if (++n > 50) { clearInterval(t); rej(new Error('firebase SDK 미로드')); }
      }, 100);
    });
  }
  if (!firebase.apps.length) firebase.initializeApp(_FB_CFG_PA);
  _fbDbPA = firebase.firestore();
  return _fbDbPA;
}

async function _fetchAnalytics(persona, market) {
  if (USE_FB_PA) {
    // 외부 호스트: Firestore status doc의 persona_analytics[market][persona] 사용
    try {
      const fs = await _initFirebasePA();
      const bot = market === 'coin' ? 'coin' : 'stock';
      const snap = await fs.collection('trading_status').doc(bot).get();
      if (!snap.exists) return null;
      const raw = snap.data();
      const pa = (raw.persona_analytics || {})[market] || {};
      const data = pa[persona];
      return data || null;
    } catch (e) {
      console.warn('[analytics fb]', e);
      return null;
    }
  }
  try {
    const r = await fetch(`${API_BASE_PA}/api/personas/analytics/${encodeURIComponent(persona)}?market=${market}`,
      {signal: AbortSignal.timeout(5000)});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return await r.json();
  } catch (e) {
    console.warn('[analytics]', e);
    return null;
  }
}

function bindTabs() {
  const tabs = document.querySelectorAll('.persona-tabs .p-tab');
  const order = ['쿨마봇','스윙맨','단타맨','존버맨'];
  tabs.forEach((tab, i) => {
    const name = order[i];
    tab.style.cursor = 'pointer';
    tab.dataset.persona = name;
    tab.classList.toggle('active', name === CUR_PERSONA);
    tab.onclick = async () => {
      CUR_PERSONA = name;
      tabs.forEach(t => t.classList.toggle('active', t.dataset.persona === name));
      await renderAll();
      const u = new URL(location.href); u.searchParams.set('persona', name);
      history.replaceState({}, '', u.toString());
    };
  });
}

function setText(sel, val) { const el = document.querySelector(sel); if (el) el.textContent = val; }

async function renderAll() {
  const meta = PERSONAS_META[CUR_PERSONA] || PERSONAS_META['쿨마봇'];
  // 1. 헤더 페르소나명/색상
  const pmHead = document.querySelector('.persona-main .pm-head');
  if (pmHead) {
    pmHead.querySelector('.pm-name').innerHTML =
      `<div class="pm-name-dot" style="background:${meta.color};"></div>${CUR_PERSONA} (${meta.desc})`;
  }

  const data = await _fetchAnalytics(CUR_PERSONA, CUR_MARKET);
  const cells = document.querySelectorAll('.persona-main .stat-cell');

  // data 없으면 모든 동적 영역 일괄 비움 (디자인 더미 잔존 방지)
  const _clearAll = (msg) => {
    cells.forEach((cell, i) => {
      const v = cell.querySelector('.stat-value');
      const sub = cell.querySelector('.stat-sub');
      if (v) { v.textContent = '-'; v.className = 'stat-value'; }
      if (sub) sub.textContent = i === 0 ? msg : '';
    });
    const bars = document.querySelector('.mini-chart .mc-bars');
    if (bars) bars.innerHTML = `<div style="color:var(--text-3);font-size:11px;width:100%;text-align:center;align-self:center">${msg}</div>`;
    const dh = document.querySelector('.mini-chart .mc-head .stat-up, .mini-chart .mc-head span:last-child');
    if (dh) { dh.textContent = '-'; dh.className = ''; }
    document.querySelectorAll('.slot-mini .sm-row').forEach((r, i) => {
      r.querySelector('.sm-bar').style.width = '0%';
      r.querySelector('.sm-pct').textContent = '-';
    });
    const sects = document.querySelectorAll('.section');
    if (sects[0]) { sects[0].querySelectorAll('.position-item').forEach(el => el.remove()); sects[0].querySelector('.s-count').textContent = '0개'; }
    if (sects[1]) { const g = sects[1].querySelector('.watching-grid'); if (g) g.innerHTML = ''; sects[1].querySelector('.s-count').textContent = '0개'; }
    if (sects[2]) { sects[2].querySelectorAll('.expected-item').forEach(el => el.remove()); sects[2].querySelector('.s-count').textContent = '0건'; }
  };

  if (!data || data.error) {
    _clearAll(data?.error ? `오류: ${data.error}` : '데이터 없음');
    return;
  }
  // total=0 등 빈 거래 케이스도 의심 — 그래도 표시는 진행 (실제 0건일 수 있음)
  const s = data.stats || {};
  // 2. stat 4셀
  if (cells[0]) {
    cells[0].querySelector('.stat-value').textContent = (s.winrate || 0) + '%';
    cells[0].querySelector('.stat-value').className = 'stat-value ' + (s.winrate >= 50 ? 'stat-up' : s.winrate < 40 ? 'stat-down' : '');
    cells[0].querySelector('.stat-sub').textContent = `${s.total}건 (${s.wins}승 ${s.losses}패)`;
  }
  if (cells[1]) {
    cells[1].querySelector('.stat-value').textContent = s.rr || '-';
    cells[1].querySelector('.stat-sub').textContent = `평균익+${s.avg_win_pct}% / 평균손-${s.avg_loss_pct}%`;
  }
  if (cells[2]) {
    const v = cells[2].querySelector('.stat-value');
    v.textContent = (s.total_pnl >= 0 ? '+' : '') + fmtKRW(s.total_pnl) + '원';
    v.className = 'stat-value ' + (s.total_pnl > 0 ? 'stat-up' : s.total_pnl < 0 ? 'stat-down' : '');
    cells[2].querySelector('.stat-sub').textContent = `${s.total_pnl_pct >= 0 ? '+' : ''}${s.total_pnl_pct}% (시드 ${fmtKRW(data.slot.total)})`;
  }
  if (cells[3]) {
    cells[3].querySelector('.stat-value').textContent = (s.avg_holding_days || 0) + '일';
    cells[3].querySelector('.stat-sub').textContent = `최대 ${s.max_holding_days || 0}일`;
  }

  // 3. 14일 미니차트
  const bars = document.querySelector('.mini-chart .mc-bars');
  const dailyHead = document.querySelector('.mini-chart .mc-head .stat-up, .mini-chart .mc-head span:last-child');
  if (bars) {
    const arr = data.daily_pnl_14d || [];
    if (arr.length === 0) {
      bars.innerHTML = '<div style="color:var(--text-3);font-size:11px;width:100%;text-align:center;align-self:center">14일 거래 없음</div>';
    } else {
      const maxAbs = Math.max(...arr.map(d => Math.abs(d.pnl || 0)), 1);
      bars.innerHTML = arr.map(d => {
        const h = Math.max(8, Math.abs(d.pnl) / maxAbs * 100);
        const cls = d.pnl >= 0 ? 'win' : 'loss';
        return `<div class="mc-bar ${cls}" style="height:${h}%" title="${d.date}: ${d.pnl >= 0 ? '+' : ''}${fmtKRW(d.pnl)}원"></div>`;
      }).join('');
    }
    if (dailyHead) {
      const sumPnl = arr.reduce((a, x) => a + (x.pnl || 0), 0);
      dailyHead.textContent = (sumPnl >= 0 ? '+' : '') + fmtKRW(sumPnl) + '원';
      dailyHead.className = sumPnl >= 0 ? 'stat-up' : 'stat-down';
    }
  }

  // 4. 슬롯 미니바
  const slot = data.slot || {};
  const smRows = document.querySelectorAll('.slot-mini .sm-row');
  if (smRows[0]) {
    smRows[0].querySelector('.sm-bar').style.width = (slot.usage_pct || 0) + '%';
    smRows[0].querySelector('.sm-bar').style.background = meta.color;
    smRows[0].querySelector('.sm-pct').textContent = fmtKRW(slot.used) + '원';
  }
  if (smRows[1]) {
    smRows[1].querySelector('.sm-bar').style.width = Math.max(0, 100 - (slot.usage_pct || 0)) + '%';
    smRows[1].querySelector('.sm-pct').textContent = fmtKRW(slot.available) + '원';
  }

  // 5. 보유 종목
  const positions = data.positions || [];
  const posSection = document.querySelectorAll('.section')[0];
  if (posSection) {
    posSection.querySelector('.s-count').textContent = `${positions.length}개`;
    // 기존 position-item 모두 제거 후 다시 그리기
    posSection.querySelectorAll('.position-item').forEach(el => el.remove());
    if (positions.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:30px 0;text-align:center;color:var(--text-3);font-size:12px';
      empty.textContent = '보유 종목 없음';
      posSection.appendChild(empty);
    } else {
      positions.forEach(p => {
        const sym = p.symbol || '-';
        const shortSym = sym.replace('KRW-','').slice(0, 4);
        const name = p.name || SYM_KO[sym] || sym.replace('KRW-','');
        const days = p.holding_days || 0;
        const heldStr = days >= 1 ? `${days.toFixed(1)}일 보유` : `${Math.round(days * 24)}시간 보유`;
        const inv = p.invested || (p.entry_price * p.amount) || 0;
        const item = document.createElement('div');
        item.className = 'position-item';
        item.style.cursor = 'pointer';
        item.innerHTML = `
          <div class="pi-icon ${meta.icoCls}">${shortSym}</div>
          <div class="pi-body">
            <div class="pi-name">${name}</div>
            <div class="pi-sub"><span>${fmtKRW(p.entry_price)}원 · ${(+p.amount||0).toFixed(p.amount < 1 ? 4 : 0)}개</span><span class="pi-time">${heldStr}</span></div>
          </div>
          <div class="pi-right">
            <div class="pi-amount">${fmtKRW(inv)}원</div>
            <div style="font-size:9px;color:var(--text-3);margin-top:2px">탭 → 상세</div>
          </div>`;
        item.addEventListener('click', () => openPosDetail(p));
        posSection.appendChild(item);
      });
    }
  }

  // 6. 검토 중 카테고리
  const sections = document.querySelectorAll('.section');
  const watchingSection = sections[1];
  if (watchingSection) {
    const cats = data.watching_categories || [];
    watchingSection.querySelector('.s-count').textContent = `${cats.length}개 카테고리`;
    const grid = watchingSection.querySelector('.watching-grid');
    if (grid) {
      if (cats.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;padding:20px 0;text-align:center;color:var(--text-3);font-size:12px">카테고리 매핑 없음</div>';
      } else {
        grid.innerHTML = cats.map(c => `<div class="wg-item">
          <div class="wg-cat">${c.category}</div>
          <div class="wg-symbols">${(c.symbols || []).map(s => s.replace('KRW-','')).join(', ')}</div>
          <div class="wg-score">${c.avg_score > 0 ? `평균 ${c.avg_score}점` : '관찰 중'}</div>
        </div>`).join('');
      }
    }
  }

  // 7. 진입 예상
  const expectedSection = sections[2];
  if (expectedSection) {
    const expected = data.expected_entries || [];
    expectedSection.querySelector('.s-count').textContent = `${expected.length}건`;
    expectedSection.querySelectorAll('.expected-item').forEach(el => el.remove());
    if (expected.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:24px 0;text-align:center;color:var(--text-3);font-size:12px';
      empty.textContent = '진입 예상 종목 없음 (자가개선 캐시 누적 후 활성)';
      expectedSection.appendChild(empty);
    } else {
      expected.forEach(e => {
        const tagsHTML = (e.tags || []).map(t => `<span class="ei-tag">${t}</span>`).join('') +
                         (e.warnings || []).map(w => `<span class="ei-tag warn">${w}</span>`).join('');
        const probCls = e.probability >= 70 ? 'stat-up' : '';
        const item = document.createElement('div');
        item.className = 'expected-item';
        item.innerHTML = `
          <div class="ei-left"><div>
            <div class="ei-symbol">${(e.symbol || '').replace('KRW-','')}</div>
            <div class="ei-reason">${tagsHTML}</div>
          </div></div>
          <div class="ei-right">
            <div class="ei-prob ${probCls}">${e.probability || 0}%</div>
            <div class="ei-time">${e.est_time || '-'}</div>
          </div>`;
        expectedSection.appendChild(item);
      });
    }
  }
}

// ─── (A) 종목 상세 시트 — Master Spec v2 §1 페르소나별 시간 캡 표시 + 판매 ───
const PERSONA_CAP = {
  '단타맨': {h:4,    label:'당일 청산 (4시간 캡)'},
  '스윙맨': {h:120,  label:'1~5일 스윙 (5일 캡)'},
  '쿨마봇': {h:720,  label:'EP 라이딩 (30일 캡)'},
  '존버맨': {h:336,  label:'안전 자산 (14일 캡)'},
};

function closePosSheet(){ document.getElementById('pa-position-sheet').style.display = 'none'; }

function paConfirm(opts){
  return new Promise(resolve => {
    const r = document.getElementById('pa-dialog');
    const danger = !!opts.danger;
    const accent = danger ? 'var(--red)' : 'var(--blue)';
    r.innerHTML = `<div style="background:var(--surface);border-radius:18px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.35)">
      <div style="padding:22px;text-align:center">
        <div style="font-size:34px;margin-bottom:10px">${opts.icon || '❓'}</div>
        <div style="font-size:16px;font-weight:800;margin-bottom:6px">${opts.title || ''}</div>
        <div style="font-size:13px;color:var(--text-2);line-height:1.55;white-space:pre-wrap">${opts.message || ''}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)">
        <button id="_d_c" style="padding:14px;background:var(--surface);border:none;font-weight:700;color:var(--text-2);cursor:pointer">취소</button>
        <button id="_d_o" style="padding:14px;background:var(--surface);border:none;font-weight:800;color:${accent};cursor:pointer">${opts.primaryLabel || '확인'}</button>
      </div></div>`;
    r.style.display = 'flex';
    r.querySelector('#_d_o').onclick = () => { r.style.display='none'; resolve(true); };
    r.querySelector('#_d_c').onclick = () => { r.style.display='none'; resolve(false); };
  });
}
function paAlert(opts){
  const r = document.getElementById('pa-dialog');
  const accent = ({success:'var(--green)',error:'var(--red)',warn:'var(--yellow)',info:'var(--blue)'}[opts.kind || 'info']);
  const icon = opts.icon || ({success:'✅',error:'❌',warn:'⚠️',info:'ℹ️'}[opts.kind || 'info']);
  r.innerHTML = `<div style="background:var(--surface);border-radius:18px;width:100%;max-width:340px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.35)">
    <div style="padding:22px;text-align:center">
      <div style="font-size:34px;margin-bottom:10px">${icon}</div>
      <div style="font-size:16px;font-weight:800;margin-bottom:6px">${opts.title || ''}</div>
      <div style="font-size:13px;color:var(--text-2);line-height:1.55;white-space:pre-wrap">${opts.message || ''}</div>
    </div>
    <button id="_a_o" style="width:100%;padding:14px;background:var(--surface);border:none;border-top:1px solid var(--line);font-weight:800;color:${accent};cursor:pointer">확인</button></div>`;
  r.style.display = 'flex';
  r.querySelector('#_a_o').onclick = () => r.style.display = 'none';
  if (opts.autoCloseMs) setTimeout(() => r.style.display = 'none', opts.autoCloseMs);
}

function openPosDetail(p) {
  const persona = CUR_PERSONA;
  const cap = PERSONA_CAP[persona];
  const sym = p.symbol || '-';
  const name = p.name || SYM_KO[sym] || sym.replace('KRW-','');
  const entryPrice = p.entry_price || 0;
  const amount = +p.amount || 0;
  const inv = p.invested || (entryPrice * amount);
  const days = p.holding_days || 0;
  const heldStr = days >= 1 ? `${Math.floor(days)}일 ${Math.round((days % 1) * 24)}시간` : `${Math.round(days * 24)}시간`;
  // 매입일자 추정
  const entryAt = days > 0 ? new Date(Date.now() - days * 86400000) : null;
  const entryStr = entryAt ? `${entryAt.getFullYear()}-${String(entryAt.getMonth()+1).padStart(2,'0')}-${String(entryAt.getDate()).padStart(2,'0')} ${String(entryAt.getHours()).padStart(2,'0')}:${String(entryAt.getMinutes()).padStart(2,'0')}` : '-';
  // 판매 예정
  let plannedExit = '미정 (모멘텀 기반)';
  if (cap && entryAt) {
    const ex = new Date(entryAt.getTime() + cap.h * 3600000);
    plannedExit = `${ex.getFullYear()}-${String(ex.getMonth()+1).padStart(2,'0')}-${String(ex.getDate()).padStart(2,'0')} ${String(ex.getHours()).padStart(2,'0')}:${String(ex.getMinutes()).padStart(2,'0')}`;
  }
  document.getElementById('pa-pos-content').innerHTML = `
    <div style="margin:8px 0 14px">
      <div style="font-size:18px;font-weight:800">${name}</div>
      <div style="font-size:11px;color:var(--text-3)">${CUR_MARKET === 'coin' ? '🪙' : '📈'} ${persona}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">
      <div style="background:var(--bg);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--text-3)">매입 단가</div><div style="font-size:13px;font-weight:800">${fmtKRW(entryPrice)}원</div></div>
      <div style="background:var(--bg);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--text-3)">투자금</div><div style="font-size:13px;font-weight:800">${fmtKRW(inv)}원</div></div>
      <div style="background:var(--bg);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--text-3)">수량</div><div style="font-size:13px;font-weight:800">${amount.toFixed(amount < 1 ? 4 : 0)}${CUR_MARKET==='coin'?'':'주'}</div></div>
      <div style="background:var(--bg);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--text-3)">보유 기간</div><div style="font-size:13px;font-weight:800">${heldStr}</div></div>
    </div>
    <div style="background:var(--bg);padding:12px;border-radius:10px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text-3)">📅 매입일자</span><b>${entryStr}</b></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="color:var(--text-3)">🎯 판매 예정</span><b style="color:var(--blue)">${plannedExit}</b></div>
      ${cap ? `<div style="font-size:10px;color:var(--text-3);margin-top:4px">※ ${cap.label}</div>` : ''}
    </div>
    <div style="background:var(--bg);padding:12px;border-radius:10px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--text-3);margin-bottom:4px">📊 분석 (Master Spec v2)</div>
      <div style="font-size:13px;font-weight:700;line-height:1.5">${persona} 룰셋 적용 중 — 모멘텀 + 시간캡 기반 자동 판매</div>
    </div>
    <button onclick="paSell('${sym.replace(/'/g,"\\'")}','${name.replace(/'/g,"\\'")}')"
      style="width:100%;padding:14px;background:var(--red);color:#fff;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer">💰 판매하기</button>
  `;
  document.getElementById('pa-position-sheet').style.display = 'flex';
}

async function paSell(sym, name) {
  const ok = await paConfirm({
    title: `${name} 판매`, icon: '💰', danger: true,
    message: '다음 사이클(60초 내) 시장가로 매도됩니다.\n취소할 수 없습니다.',
    primaryLabel: '판매',
  });
  if (!ok) return;
  if (USE_FB_PA) {
    paAlert({kind:'warn', title:'외부 모드', message:'외부 호스트에서는 시뮬레이션 모드.\n로컬 사이트에서 판매 가능.', autoCloseMs: 2500});
    return;
  }
  try {
    const bot = CUR_MARKET === 'coin' ? 'coin' : 'stock';
    const r = await fetch(`${API_BASE_PA}/api/positions/close`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({bot, symbol: sym})
    });
    const d = await r.json();
    if (d.ok) {
      paAlert({kind:'success', title:'판매 예약 완료', message:`${name}\n다음 사이클에 매도됩니다.`, autoCloseMs:1800});
      closePosSheet();
      setTimeout(renderAll, 1500);
    } else {
      paAlert({kind:'error', title:'예약 실패', message: d.error || '알 수 없음'});
    }
  } catch (e) { paAlert({kind:'error', title:'네트워크 오류', message: e.message}); }
}

// ─── (B) 페르소나 누적 매출 라인차트 ───
const PERSONA_COLORS = {'쿨마봇':'#8B5CF6','스윙맨':'#1B9856','단타맨':'#3182F6','존버맨':'#F8AE3C'};

async function renderComparison(days) {
  const svg = document.getElementById('cmp-svg');
  const legend = document.getElementById('cmp-legend');
  if (!svg) return;
  let data = null;
  if (USE_FB_PA) {
    // 외부: Firestore에는 시리즈 없음 → 미니차트로 대체 안내
    svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#8B95A1" font-size="11">로컬 사이트에서만 표시</text>';
    legend.innerHTML = '';
    return;
  }
  try {
    const r = await fetch(`${API_BASE_PA}/api/personas/comparison?market=${CUR_MARKET}&days=${days}`,
      {signal: AbortSignal.timeout(5000)});
    if (r.ok) data = await r.json();
  } catch (e) { console.warn('[cmp]', e); }
  if (!data || !data.dates || data.dates.length === 0) {
    svg.innerHTML = '<text x="50%" y="50%" text-anchor="middle" fill="#8B95A1" font-size="11">데이터 없음</text>';
    legend.innerHTML = '';
    return;
  }
  const W = 320, H = 140, PAD = 8, PADL = 30;
  const allVals = Object.values(data.series).flat();
  const minV = Math.min(0, ...allVals);
  const maxV = Math.max(0, ...allVals);
  const range = (maxV - minV) || 1;
  const xStep = (W - PADL - PAD) / Math.max(1, data.dates.length - 1);
  const y = v => H - PAD - ((v - minV) / range) * (H - 2 * PAD);
  // 0 라인
  const zeroY = y(0);
  let g = `<line x1="${PADL}" y1="${zeroY}" x2="${W - PAD}" y2="${zeroY}" stroke="#E5E8EB" stroke-dasharray="2,2"/>`;
  // y축 라벨 (max/0/min)
  g += `<text x="${PADL - 4}" y="${PAD + 4}" text-anchor="end" font-size="9" fill="#8B95A1">${fmtKRW(maxV)}</text>`;
  g += `<text x="${PADL - 4}" y="${zeroY + 3}" text-anchor="end" font-size="9" fill="#8B95A1">0</text>`;
  if (minV < 0) g += `<text x="${PADL - 4}" y="${H - PAD}" text-anchor="end" font-size="9" fill="#8B95A1">${fmtKRW(minV)}</text>`;
  // 4 라인
  Object.entries(data.series).forEach(([persona, arr]) => {
    const color = PERSONA_COLORS[persona] || '#8B95A1';
    const pts = arr.map((v, i) => `${PADL + i * xStep},${y(v)}`).join(' ');
    g += `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>`;
    // 끝점
    const last = arr[arr.length - 1];
    g += `<circle cx="${PADL + (arr.length - 1) * xStep}" cy="${y(last)}" r="3" fill="${color}"/>`;
  });
  svg.innerHTML = g;
  // legend
  legend.innerHTML = Object.entries(data.series).map(([p, arr]) => {
    const last = arr[arr.length - 1];
    const sign = last >= 0 ? '+' : '';
    return `<div style="display:flex;align-items:center;gap:4px">
      <span style="width:10px;height:3px;background:${PERSONA_COLORS[p]};display:inline-block;border-radius:2px"></span>
      <span style="font-weight:700">${p}</span>
      <span style="color:${last >= 0 ? 'var(--red)' : 'var(--blue)'};font-weight:700">${sign}${fmtKRW(last)}원</span>
    </div>`;
  }).join('');
}

function bindCmpRange() {
  document.querySelectorAll('.cmp-range').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.cmp-range').forEach(b => {
        b.classList.remove('active');
        b.style.background = 'var(--surface)';
        b.style.color = 'var(--text-1)';
        b.style.borderColor = 'var(--line)';
      });
      btn.classList.add('active');
      btn.style.background = 'var(--text-1)';
      btn.style.color = '#fff';
      btn.style.borderColor = 'var(--text-1)';
      renderComparison(parseInt(btn.dataset.d));
    };
  });
}

// ─── (Step 3+4) export 함수 ───
function exportFullReport(format) {
  const days = document.getElementById('export-period').value;
  if (USE_FB_PA) {
    paAlert({kind:'warn', title:'외부 모드', message:'외부 호스트에서는 ZIP/MD/JSON 다운로드 불가.\n로컬 사이트(127.0.0.1) 또는 LAN에서 다운로드 가능.', autoCloseMs:3500});
    return;
  }
  const url = `${API_BASE_PA}/api/export/full-report?market=${CUR_MARKET}&days=${days}&format=${format}`;
  window.location.href = url;
  paAlert({kind:'success', title:'다운로드 시작', message:`${format.toUpperCase()} 생성 중`, autoCloseMs:1400});
}

function exportPersonaCSV() {
  if (USE_FB_PA) {
    paAlert({kind:'warn', title:'외부 모드', message:'CSV 다운로드는 로컬 사이트에서만 가능.', autoCloseMs:2500});
    return;
  }
  const url = `${API_BASE_PA}/api/personas/${encodeURIComponent(CUR_PERSONA)}/export/csv?market=${CUR_MARKET}`;
  window.location.href = url;
  paAlert({kind:'success', title:'CSV 다운로드', message:`${CUR_PERSONA} 거래 내역`, autoCloseMs:1400});
}

async function copyPersonaText() {
  if (USE_FB_PA) {
    paAlert({kind:'warn', title:'외부 모드', message:'텍스트 복사는 로컬 사이트에서만.', autoCloseMs:2500});
    return;
  }
  try {
    const r = await fetch(`${API_BASE_PA}/api/personas/${encodeURIComponent(CUR_PERSONA)}/export/text?market=${CUR_MARKET}`);
    const d = await r.json();
    if (d.text) {
      await navigator.clipboard.writeText(d.text);
      paAlert({kind:'success', title:'클립보드 복사 완료', message:'채팅에 붙여넣기 가능', autoCloseMs:1600});
    } else {
      paAlert({kind:'error', title:'복사 실패', message: d.error || '데이터 없음'});
    }
  } catch (e) { paAlert({kind:'error', title:'네트워크 오류', message: e.message}); }
}

async function createShareLink() {
  if (USE_FB_PA) {
    paAlert({kind:'warn', title:'외부 모드', message:'공유 링크는 로컬 사이트에서만.', autoCloseMs:2500});
    return;
  }
  try {
    const r = await fetch(`${API_BASE_PA}/api/personas/${encodeURIComponent(CUR_PERSONA)}/export/link?market=${CUR_MARKET}`);
    const d = await r.json();
    if (d.url) {
      await navigator.clipboard.writeText(d.url);
      paAlert({kind:'success', title:'공유 링크 복사됨', message:`24시간 유효\n${d.url}`, autoCloseMs:3000});
    } else {
      paAlert({kind:'error', title:'생성 실패', message: d.error || '알 수 없음'});
    }
  } catch (e) { paAlert({kind:'error', title:'네트워크 오류', message: e.message}); }
}

document.addEventListener('DOMContentLoaded', () => {
  const headerBtns = document.querySelectorAll('.header .h-btn');
  if (headerBtns[0]) { headerBtns[0].onclick = () => { history.length > 1 ? history.back() : (location.href = 'index.html'); }; headerBtns[0].style.cursor = 'pointer'; }

  bindTabs();
  bindCmpRange();
  renderAll();
  renderComparison(30);
});
